<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mission Dorade – ProShop Arbeitsquelle</title>
<style>
html,body{margin:0;min-height:100%;background:#f6f8fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#102034}
#status{min-height:100vh;display:grid;place-items:center;padding:30px;text-align:center}
</style>
</head>
<body>
<div id="status"><div><h1>Mission Dorade</h1><p>Die vollständige ProShop-Arbeitsseite wird geladen …</p></div></div>
<script>
(async()=>{
  try{
    const source='https://raw.githubusercontent.com/Adler-FSA/lp-anfang/8b1f047f66443a48f573d458856f8ec5a5aade13/pages/mission-dorade/projekt-shop-bilder-logos-pdf.html';
    const shell=await fetch(source,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('Arbeitsquelle nicht erreichbar');return r.text()});
    const match=shell.match(/const b64="([A-Za-z0-9+/=]+)"/);
    if(!match) throw new Error('Arbeitsquelle konnte nicht gelesen werden');
    const bin=Uint8Array.from(atob(match[1]),c=>c.charCodeAt(0));
    const stream=new Blob([bin]).stream().pipeThrough(new DecompressionStream('gzip'));
    let page=await new Response(stream).text();
    const collageNames={
      'standard-collection-md-md001-md010.png':'standard-collection.png',
      'ocean-collection-md-md011-md020.png':'ocean-collection.png',
      'explorer-collection-md-md021-md030.png':'explorer-collection.png',
      'founder-collection-md-md031-md040.png':'founder-collection.png',
      'captain-collection-md-md041-md050.png':'captain-collection.png'
    };
    page=page.replace(/assets\/proshop-produkte\/(?:collagen|produktbilder\/(?:standard|ocean|explorer|founder|captain)|downloads)\/([^"'<>?#]+)/g,(all,name)=>collageNames[name]||name);
    page=page.replace(/assets\/proshop\/(?:collagen|produktbilder\/(?:standard|ocean|explorer|founder|captain)|downloads)\/([^"'<>?#]+)/g,(all,name)=>collageNames[name]||name);
    document.open();
    document.write(page);
    document.close();
  }catch(error){
    document.getElementById('status').innerHTML='<div><h1>Mission Dorade</h1><p>Die Arbeitsseite konnte nicht geladen werden.</p><p>'+String(error.message||error)+'</p></div>';
  }
})();
</script>
</body>
</html>
