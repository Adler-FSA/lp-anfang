<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mission Dorade – ProShop Arbeitsseite für Chantal</title>
<style>
html,body{margin:0;width:100%;height:100%;background:#f6f8fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#loading{position:fixed;inset:0;display:grid;place-items:center;text-align:center;color:#102034;background:#f6f8fb;z-index:2}
iframe{width:100%;height:100%;border:0;display:block;background:#f6f8fb}
</style>
</head>
<body>
<div id="loading"><div><h1>Mission Dorade</h1><p>Die vollständige Arbeitsseite wird geladen …</p></div></div>
<iframe id="workpage" src="projekt-shop-bilder-logos-pdf.html?source=final" title="Mission Dorade ProShop Arbeitsseite"></iframe>
<script>
(function(){
  const frame=document.getElementById('workpage');
  const loading=document.getElementById('loading');
  const collageNames={
    'standard-collection-md-md001-md010.png':'standard-collection.png',
    'ocean-collection-md-md011-md020.png':'ocean-collection.png',
    'explorer-collection-md-md021-md030.png':'explorer-collection.png',
    'founder-collection-md-md031-md040.png':'founder-collection.png',
    'captain-collection-md-md041-md050.png':'captain-collection.png'
  };
  function flatten(url){
    if(!url||!url.includes('assets/proshop-produkte/')) return url;
    let name=url.split('/').pop();
    if(collageNames[name]) name=collageNames[name];
    return name;
  }
  function repair(){
    try{
      const doc=frame.contentDocument;
      if(!doc||!doc.body) return false;
      doc.querySelectorAll('[src]').forEach(el=>{
        const old=el.getAttribute('src');
        const next=flatten(old);
        if(next!==old) el.setAttribute('src',next);
      });
      doc.querySelectorAll('[href]').forEach(el=>{
        const old=el.getAttribute('href');
        const next=flatten(old);
        if(next!==old) el.setAttribute('href',next);
      });
      loading.style.display='none';
      return true;
    }catch(e){return false;}
  }
  frame.addEventListener('load',()=>{
    let tries=0;
    const timer=setInterval(()=>{
      tries++;
      repair();
      if(tries>40) clearInterval(timer);
    },250);
  });
})();
</script>
</body>
</html>
