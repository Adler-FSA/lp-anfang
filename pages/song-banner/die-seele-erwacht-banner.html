<!doctype html>
<!--
  LiquidityBooster – Song Banner – Die Seele erwacht
  GitHub-Pfad: lp-anfang/pages/song-banner/die-seele-erwacht-banner.html
  Commit-Message: song banner fuer die seele erwacht mit cover kleinem player und loop button
  Testlink (nocache): https://adler-fsa.github.io/lp-anfang/pages/song-banner/die-seele-erwacht-banner.html?nocache=__TS__
-->
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Die Seele erwacht – Song Banner</title>
  <meta name="description" content="Einfacher iframe-fähiger Song-Banner mit Cover, Audio-Player und Endlos-Button." />
  <meta name="robots" content="index,follow" />
  <style>
    :root{
      --bg:#ffffff;
      --card:#ffffff;
      --text:#111111;
      --muted:#5f6672;
      --line:rgba(17,17,17,.10);
      --pink:#ff4fb3;
      --pink-soft:rgba(255,79,179,.12);
      --mint:#20d8b2;
      --mint-soft:rgba(32,216,178,.12);
      --shadow:0 14px 38px rgba(0,0,0,.10);
      --radius:22px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:transparent;
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
    }

    body{
      padding:14px;
    }

    .banner{
      width:min(100%,980px);
      margin:0 auto;
      background:
        linear-gradient(135deg, rgba(255,255,255,.98), rgba(252,255,254,.98)),
        linear-gradient(135deg, var(--pink-soft), var(--mint-soft));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px 18px;
      display:grid;
      grid-template-columns:132px minmax(0,1fr);
      gap:16px;
      align-items:center;
      overflow:hidden;
      position:relative;
      isolation:isolate;
    }

    .banner::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at top left, rgba(255,79,179,.10), transparent 34%),
        radial-gradient(circle at bottom right, rgba(32,216,178,.10), transparent 34%);
      z-index:-1;
      pointer-events:none;
    }

    .cover-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .cover{
      width:132px;
      height:132px;
      display:block;
      object-fit:cover;
      border-radius:18px;
      border:1px solid rgba(17,17,17,.08);
      box-shadow:0 10px 24px rgba(0,0,0,.12);
      background:#f3f3f3;
    }

    .content{
      min-width:0;
      display:grid;
      gap:10px;
      align-items:center;
    }

    .eyebrow{
      margin:0;
      font-size:12px;
      line-height:1.2;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .title{
      margin:0;
      font-size:clamp(24px,3vw,38px);
      line-height:1.02;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .subtitle{
      margin:0;
      font-size:14px;
      line-height:1.45;
      color:var(--muted);
    }

    .player-row{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:10px;
      padding-top:2px;
    }

    audio{
      width:min(100%,360px);
      height:40px;
      flex:1 1 300px;
    }

    .loop-btn{
      appearance:none;
      border:0;
      border-radius:999px;
      background:linear-gradient(135deg,var(--pink),var(--mint));
      color:#111111;
      font-weight:800;
      font-size:14px;
      line-height:1;
      padding:12px 16px;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(0,0,0,.12);
      transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
      white-space:nowrap;
    }

    .loop-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 14px 30px rgba(0,0,0,.16);
    }

    .loop-btn:active{
      transform:translateY(0);
    }

    .loop-btn.is-active{
      background:linear-gradient(135deg,#111111,#2d343f);
      color:#ffffff;
    }

    .hint{
      margin:0;
      font-size:12px;
      line-height:1.35;
      color:var(--muted);
    }

    @media (max-width:720px){
      .banner{
        grid-template-columns:1fr;
        justify-items:center;
        text-align:center;
      }

      .content{
        width:100%;
      }

      .player-row{
        justify-content:center;
      }

      audio{
        flex:1 1 100%;
        width:100%;
      }
    }
  </style>
</head>
<body>
  <section class="banner" aria-label="Song Banner Die Seele erwacht">
    <div class="cover-wrap">
      <img
        class="cover"
        src="../../library/images/IMG_6043.jpeg"
        alt="Cover zum Lied Die Seele erwacht"
      />
    </div>

    <div class="content">
      <p class="eyebrow">LiquidityBooster Song</p>
      <h1 class="title">Die Seele erwacht</h1>
      <p class="subtitle">Einfach anhören, starten und bei Bedarf im Endloslauf laufen lassen.</p>

      <div class="player-row">
        <audio id="songPlayer" controls preload="metadata">
          <source src="../../library/music/die-seele-erwacht.mp3" type="audio/mpeg" />
          Dein Browser unterstützt dieses Audio-Element nicht.
        </audio>

        <button id="loopToggle" class="loop-btn" type="button" aria-pressed="false">
          Endloslauf aus
        </button>
      </div>

      <p class="hint">Tipp: Der Button schaltet den Loop-Modus direkt für dieses Lied ein oder aus.</p>
    </div>
  </section>

  <script>
    (function(){
      const player = document.getElementById('songPlayer');
      const loopToggle = document.getElementById('loopToggle');

      function updateLoopButton(){
        const active = !!player.loop;
        loopToggle.classList.toggle('is-active', active);
        loopToggle.setAttribute('aria-pressed', String(active));
        loopToggle.textContent = active ? 'Endloslauf an' : 'Endloslauf aus';
      }

      loopToggle.addEventListener('click', function(){
        player.loop = !player.loop;
        updateLoopButton();
      });

      updateLoopButton();
    })();
  </script>
</body>
</html>
