  <style>
    :root{

<body>
  <div class="wrap">
    <nav class="langbar" aria-label="Language switch">
      <a id="lnkDE" href="?lang=de" hreflang="de" lang="de" data-i18n="langDE">DE</a>

    <header>
      <h1 data-i18n="title">Club-Regelkarte für Mitglieder</h1>
    </header>

    <main id="content" aria-label="Content"></main>
  </div>

  <script>
    (function(){
      "use strict";

      function getLang(){
        const url = new URL(window.location.href);
        const q = (url.searchParams.get("lang") || "").toLowerCase().trim();
        if(q === "en" || q === "de") return q;
        const nav = (navigator.language || "de").toLowerCase();
        return nav.startsWith("en") ? "en" : "de";
      }

      const i18n = {
        de: {
          title: "Club-Regelkarte für Mitglieder",
          html: `
            <h2 data-i18n="pathHead">Orientierungspfad (oben – kurz & klar)</h2>
            <p class="note" data-i18n="pathLead">Was diese Regelkarte leistet – als schneller Überblick:</p>
            <ol data-i18n="pathSteps">
              <li><strong>Schutz für alle.</strong><br/>Regeln schützen Community und jedes einzelne Mitglied.</li>
              <li><strong>Klare Kommunikation.</strong><br/>Respekt, Ehrlichkeit, keine Versprechen, keine Druckkommunikation.</li>
              <li><strong>Eigenverantwortung.</strong><br/>Wissen ja – Entscheidungen liegen immer beim Mitglied.</li>
              <li><strong>Marke & Vertraulichkeit.</strong><br/>Schutz von Namen, Materialien und internen Inhalten.</li>
            </ol>

            <div class="divider" role="separator" aria-hidden="true"></div>

            <h2 data-i18n="brandHead">LiquidityBooster • FSA Club • Akademie</h2>

            <h3 data-i18n="whyHead">Warum es diese Regeln gibt</h3>
            <p data-i18n="p1">Der LiquidityBooster, der FSA Club und die Akademie sind ein gemeinsamer Lern- und Erfahrungsraum. Menschen kommen hier zusammen, um wirtschaftliche Zusammenhänge besser zu verstehen, Erfahrungen auszutauschen und sich gegenseitig zu unterstützen.</p>
            <p data-i18n="p2">Damit ein solcher Raum langfristig funktionieren kann, braucht er klare und faire Regeln. Diese Regeln schützen sowohl die Community als auch jeden einzelnen Teilnehmer.</p>
            <p data-i18n="p3">Die folgende Regelkarte fasst die wichtigsten Grundsätze des Clubs verständlich zusammen.</p>
            <p data-i18n="p4">Die vollständigen rechtlichen Regelungen findest du in den Allgemeinen Geschäftsbedingungen (AGB).</p>

            <h3 data-i18n="r1">Regel 1 – Respektvoller Umgang</h3>
            <p data-i18n="r1p1">Der Club ist ein Lernraum. Mitglieder begegnen sich respektvoll, offen und ehrlich.</p>
            <p data-i18n="r1p2">Niemand wird unter Druck gesetzt, niemand wird beleidigt oder abgewertet. Gespräche sollen Orientierung geben und nicht manipulieren.</p>

            <h3 data-i18n="r2">Regel 2 – Ehrliche Kommunikation</h3>
            <p data-i18n="r2p1">Wenn du über den Club sprichst oder ihn empfiehlst, bleibe immer ehrlich und nachvollziehbar.</p>
            <p data-i18n="r2p2">Der Club verspricht keine schnellen Gewinne und keine garantierten Ergebnisse. Aussagen, die solche Erwartungen erzeugen, entsprechen nicht dem Charakter der Plattform.</p>

            <h3 data-i18n="r3">Regel 3 – Keine Einkommensgarantie</h3>
            <p data-i18n="r3p1">Im System können unter bestimmten Voraussetzungen Einnahmen entstehen. Diese hängen jedoch immer von individuellen Faktoren ab.</p>
            <p data-i18n="r3p2">Es gibt keine Garantie für Einkommen oder wirtschaftliche Ergebnisse.</p>
            <p data-i18n="r3p3">Jeder entscheidet selbst, wie aktiv er sich einbringt.</p>

            <h3 data-i18n="r4">Regel 4 – Eigenverantwortung</h3>
            <p data-i18n="r4p1">Der Club vermittelt Wissen, Perspektiven und Erfahrungen.</p>
            <p data-i18n="r4p2">Welche Entscheidungen du daraus ableitest, liegt vollständig in deiner eigenen Verantwortung.</p>
            <p data-i18n="r4p3">Bei wichtigen finanziellen, steuerlichen oder rechtlichen Entscheidungen solltest du im Zweifel unabhängige Fachberatung einholen.</p>

            <h3 data-i18n="r5">Regel 5 – Mitglieder handeln eigenständig</h3>
            <p data-i18n="r5p1">Mitglieder sind keine Mitarbeiter des Clubs.</p>
            <p data-i18n="r5p2">Sie handeln immer als eigenständige Personen und nicht als Vertreter oder offizielle Sprecher des Systems.</p>
            <p data-i18n="r5p3">Empfehlungen erfolgen freiwillig und aus persönlicher Überzeugung.</p>

            <h3 data-i18n="r6">Regel 6 – Schutz der Community</h3>
            <p data-i18n="r6p1">Die Community basiert auf Vertrauen.</p>
            <p data-i18n="r6p2">Irreführende Aussagen, Druckkommunikation oder unrealistische Versprechen widersprechen den Grundwerten des Clubs.</p>
            <p data-i18n="r6p3">Wer gegen diese Grundsätze verstößt, kann von Plattformfunktionen ausgeschlossen werden.</p>

            <h3 data-i18n="r7">Regel 7 – Schutz der Marke</h3>
            <p data-i18n="r7p1">Die Namen LiquidityBooster, FSA Club und Akademie sowie Logos, Designs und Plattformstrukturen sind geschützt.</p>
            <p data-i18n="r7p2">Eigene Nachbauten von Webseiten, Landingpages oder offiziellen Materialien sind nicht erlaubt.</p>
            <p data-i18n="r7p3">Offizielle Werbemittel werden ausschließlich über die vorgesehenen Plattformkanäle bereitgestellt.</p>

            <h3 data-i18n="r8">Regel 8 – Social Media</h3>
            <p data-i18n="r8p1">Mitglieder dürfen über ihre Erfahrungen sprechen und Inhalte teilen.</p>
            <p data-i18n="r8p2">Dabei muss jedoch immer klar bleiben, dass sie als Mitglied sprechen und nicht als offizieller Betreiber oder Support.</p>
            <p data-i18n="r8p3">Gruppen oder Seiten dürfen nicht so gestaltet sein, dass sie wie offizielle Plattformstrukturen wirken.</p>

            <h3 data-i18n="r9">Regel 9 – Vertraulichkeit</h3>
            <p data-i18n="r9p1">Inhalte aus Mitgliederbereichen, internen Plattformstrukturen oder geschützten Kursmaterialien dürfen nicht öffentlich verbreitet werden.</p>
            <p data-i18n="r9p2">Diese Regel schützt sowohl die Community als auch die Lerninhalte der Akademie.</p>

            <h3 data-i18n="r10">Regel 10 – Ziel des Clubs</h3>
            <p data-i18n="r10p1">Der Club soll Menschen helfen, Zusammenhänge zu verstehen und eigenständige Entscheidungen zu treffen.</p>
            <p data-i18n="r10p2">Er ist kein System schneller Gewinne, sondern ein Raum für Bildung, Austausch und persönliche Entwicklung.</p>
            <p data-i18n="r10p3">Wer mit dieser Haltung teilnimmt, trägt dazu bei, dass die Community langfristig stabil und vertrauenswürdig bleibt.</p>

            <h3 data-i18n="closeHead">Abschluss</h3>
            <p data-i18n="c1">Diese Regeln sind kein „Korsett“. Sie sind ein Schutzrahmen, damit Lernen, Austausch und Empfehlung fair bleiben.</p>
            <p data-i18n="c2">Wer respektvoll spricht, ehrlich bleibt und keine Erwartungen verkauft, stärkt die Community – und damit auch die eigene Glaubwürdigkeit.</p>
            <div class="quote"><p data-i18n="finalRule">Lernen braucht Vertrauen. Vertrauen braucht Regeln.</p></div>
          `
        },

        en: {
          title: "Club rule card for members",
          html: `
            <h2 data-i18n="pathHead">Orientation path (top – short & clear)</h2>
            <p class="note" data-i18n="pathLead">What this rule card does — as a quick overview:</p>
            <ol data-i18n="pathSteps">
              <li><strong>Protection for everyone.</strong><br/>Rules protect the community and each individual member.</li>
              <li><strong>Clear communication.</strong><br/>Respect, honesty, no promises, no pressure communication.</li>
              <li><strong>Personal responsibility.</strong><br/>Knowledge yes — decisions always remain with the member.</li>
              <li><strong>Brand & confidentiality.</strong><br/>Protection of names, materials, and internal content.</li>
            </ol>

            <div class="divider" role="separator" aria-hidden="true"></div>

            <h2 data-i18n="brandHead">LiquidityBooster • FSA Club • Academy</h2>

            <h3 data-i18n="whyHead">Why these rules exist</h3>
            <p data-i18n="p1">LiquidityBooster, the FSA Club, and the Academy are a shared space for learning and experience. People come together to better understand economic connections, exchange experiences, and support one another.</p>
            <p data-i18n="p2">For such a space to work long-term, it needs clear and fair rules. These rules protect both the community and each individual participant.</p>
            <p data-i18n="p3">The following rule card summarizes the most important principles of the club in an easy-to-understand way.</p>
            <p data-i18n="p4">You can find the full legal terms in the General Terms and Conditions (GTC).</p>

            <h3 data-i18n="r1">Rule 1 – Respectful conduct</h3>
            <p data-i18n="r1p1">The club is a learning space. Members treat each other with respect, openness, and honesty.</p>
            <p data-i18n="r1p2">No one is pressured, insulted, or devalued. Conversations should provide orientation — not manipulation.</p>

            <h3 data-i18n="r2">Rule 2 – Honest communication</h3>
            <p data-i18n="r2p1">When you talk about the club or recommend it, always be honest and transparent.</p>
            <p data-i18n="r2p2">The club does not promise quick profits or guaranteed results. Statements that create such expectations do not match the character of the platform.</p>

            <h3 data-i18n="r3">Rule 3 – No income guarantee</h3>
            <p data-i18n="r3p1">In certain circumstances, income may arise within the system. However, this always depends on individual factors.</p>
            <p data-i18n="r3p2">There is no guarantee of income or economic outcomes.</p>
            <p data-i18n="r3p3">Everyone decides for themselves how active they want to be.</p>

            <h3 data-i18n="r4">Rule 4 – Personal responsibility</h3>
            <p data-i18n="r4p1">The club provides knowledge, perspectives, and experiences.</p>
            <p data-i18n="r4p2">What decisions you derive from it is entirely your own responsibility.</p>
            <p data-i18n="r4p3">For important financial, tax, or legal decisions, seek independent professional advice if needed.</p>

            <h3 data-i18n="r5">Rule 5 – Members act independently</h3>
            <p data-i18n="r5p1">Members are not employees of the club.</p>
            <p data-i18n="r5p2">They always act as independent individuals — not as representatives or official spokespeople of the system.</p>
            <p data-i18n="r5p3">Recommendations are voluntary and based on personal conviction.</p>

            <h3 data-i18n="r6">Rule 6 – Protecting the community</h3>
            <p data-i18n="r6p1">The community is built on trust.</p>
            <p data-i18n="r6p2">Misleading statements, pressure communication, or unrealistic promises contradict the club’s core values.</p>
            <p data-i18n="r6p3">Those who violate these principles may be excluded from platform functions.</p>

            <h3 data-i18n="r7">Rule 7 – Protecting the brand</h3>
            <p data-i18n="r7p1">The names LiquidityBooster, FSA Club, and Academy as well as logos, designs, and platform structures are protected.</p>
            <p data-i18n="r7p2">Creating copies of websites, landing pages, or official materials is not allowed.</p>
            <p data-i18n="r7p3">Official promotional materials are provided exclusively through the intended platform channels.</p>

            <h3 data-i18n="r8">Rule 8 – Social media</h3>
            <p data-i18n="r8p1">Members may talk about their experiences and share content.</p>
            <p data-i18n="r8p2">However, it must always be clear they speak as a member — not as an official operator or support.</p>
            <p data-i18n="r8p3">Groups or pages must not be designed in a way that makes them look like official platform structures.</p>

            <h3 data-i18n="r9">Rule 9 – Confidentiality</h3>
            <p data-i18n="r9p1">Content from member areas, internal platform structures, or protected course materials may not be shared publicly.</p>
            <p data-i18n="r9p2">This rule protects both the community and the Academy’s learning content.</p>

            <h3 data-i18n="r10">Rule 10 – The club’s purpose</h3>
            <p data-i18n="r10p1">The club aims to help people understand connections and make independent decisions.</p>
            <p data-i18n="r10p2">It is not a quick-profit system, but a space for education, exchange, and personal development.</p>
            <p data-i18n="r10p3">Those who participate with this attitude help keep the community stable and trustworthy over the long term.</p>

            <h3 data-i18n="closeHead">Closing</h3>
            <p data-i18n="c1">These rules are not a “cage.” They are a protective frame so learning, exchange, and recommending can remain fair.</p>
            <p data-i18n="c2">If you speak respectfully, stay honest, and don’t sell expectations, you strengthen the community — and your own credibility.</p>
            <div class="quote"><p data-i18n="finalRule">Learning needs trust. Trust needs rules.</p></div>
          `
        }
      };

      const lang = getLang();
      document.documentElement.setAttribute("lang", lang);

      const lnkDE = document.getElementById("lnkDE");
      const lnkEN = document.getElementById("lnkEN");
      if(lang === "de"){
        lnkDE.setAttribute("aria-current","true");
        lnkEN.removeAttribute("aria-current");
      }else{
        lnkEN.setAttribute("aria-current","true");
        lnkDE.removeAttribute("aria-current");
      }

      document.querySelectorAll('[data-i18n="title"]').forEach(function(el){
        el.textContent = i18n[lang].title;
      });

      document.getElementById("content").innerHTML = i18n[lang].html;

    })();
  </script>
</body>
</html>
