  <script>
    (function(){
      "use strict";

      function getLang(){
        const url = new URL(window.location.href);
        const q = (url.searchParams.get("lang") || "").toLowerCase().trim();
        if(q === "en" || q === "de") return q;
        const nav = (navigator.language || "de").toLowerCase();
        return nav.startsWith("en") ? "en" : "de";
      }

      const i18n = {
        de: {
          title: "Mitgliedschaft empfehlen – Bildungsraum & Aktivitätsweg",
          html: `
            <h2 data-i18n="pathHead">Orientierungspfad (oben – kurz & klar)</h2>
            <p class="note" data-i18n="pathLead">Worum es auf dieser Seite geht – als einfacher Ablauf für Mitglieder:</p>
            <ol data-i18n="pathSteps">
              <li><strong>Der Club ist ein Lernraum.</strong><br/>Mitgliedschaft bedeutet zuerst: Zugang zu Bildung, Orientierung und Austausch.</li>
              <li><strong>Empfehlung ist eine Tätigkeit – nicht Verkauf.</strong><br/>Du erklärst keine Produkte, du drückst niemanden. Du zeigst nur die Tür: „Schau es dir an. Entscheide selbst.“</li>
              <li><strong>Zwei Wege laufen parallel.</strong><br/><strong>Bildungsweg</strong> (nur lernen) und <strong>Aktivitätsweg</strong> (zusätzlich empfehlen).</li>
              <li><strong>Haltung & Klarheit.</strong><br/>Keine Versprechen. Keine Garantien. Kein „automatisch“. Immer: „Du entscheidest selbst.“</li>
            </ol>

            <div class="divider" role="separator" aria-hidden="true"></div>

            <h2 data-i18n="mainHead">LiquidityBooster • FSA Club • Akademie</h2>

            <p data-i18n="p1">Es gibt im Club eine Tätigkeit, die bewusst einfach gehalten ist: die Mitgliedschaft empfehlen. Nicht Produkte erklären, nicht Kurse verkaufen, nicht Menschen „überzeugen“. Sondern nur das eine: Jemandem sagen, dass es diesen Club gibt – und dass er für Menschen gedacht ist, die sich mit Geld, Bildung, digitalen Entscheidungen und persönlicher Souveränität beschäftigen wollen.</p>

            <p data-i18n="p2">Warum ist das so klar getrennt? Weil ein Bildungssystem nur dann fair ist, wenn Menschen nicht überreden müssen – sondern orientieren dürfen. Eine Empfehlung bedeutet: „Schau es dir an, entscheide selbst.“ Keine Versprechen, keine Garantie, kein Druck. Wer danach einsteigt, tut das aus eigener Entscheidung – und genau das ist wichtig, weil Bildung immer freiwillig sein muss, sonst wird sie zu Manipulation.</p>

            <p data-i18n="p3">Damit jeder seinen Weg im Club selbst bestimmen kann, gibt es zwei saubere Wege, die parallel existieren – ohne Widerspruch.</p>

            <h3 data-i18n="w1Head">Weg 1: Bildungsweg</h3>
            <p data-i18n="w1p1">Menschen nutzen die Mitgliedschaft wie einen ruhigen Einstieg in eine neue Denkweise. Sie lesen, verstehen Zusammenhänge, lernen, stellen Fragen, schauen sich die Akademie an und bauen Schritt für Schritt Klarheit auf. Sie müssen niemanden empfehlen, sie müssen nichts „leisten“. Sie nutzen den Club als Bildungsraum – so wie eine Universität als Raum funktioniert: Man geht dorthin, um zu verstehen, nicht um sofort zu verdienen.</p>

            <h3 data-i18n="w2Head">Weg 2: Aktivitätsweg</h3>
            <p data-i18n="w2p1">Menschen nutzen die Mitgliedschaft zusätzlich als Möglichkeit, aktiv zu werden – indem sie die Mitgliedschaft empfehlen. Auch hier gilt: Es geht nicht darum, jemanden zu überreden, sondern um ein Gespräch auf Augenhöhe. Wer empfiehlt, spricht aus eigener Erfahrung. Und wer einsteigt, entscheidet selbst. Wenn daraus eine Mitgliedschaft entsteht, kann eine Vergütung im Rahmen der Club-Logik entstehen – nicht als Versprechen, sondern als Ergebnis einer Aktivität in einem System, das diese Weitergabe von Informationen bewusst erlaubt.</p>

            <h3 data-i18n="uniHead">Das Universitätsbild</h3>
            <p data-i18n="uniP">Das Universitätsbild hilft, das zu verstehen: Eine Universität hat Studierende, die nur lernen. Und sie hat Menschen, die zusätzlich aktiv sind – Tutor*innen, Mentoren, Veranstaltungshelfer, Botschafter, manchmal auch Menschen, die neue Studierende aufmerksam machen. Das Lernen bleibt das Zentrum – aber es gibt Rollen, die helfen, dass das System wächst und lebendig bleibt. Und genau so ist es hier: Der Club ist zuerst ein Bildungsraum. Die Empfehlung ist nur eine mögliche Tätigkeit innerhalb dieses Rahmens.</p>

            <h3 data-i18n="attHead">Wichtig ist die innere Haltung</h3>
            <div class="quote"><p data-i18n="quote1">„Ich bin Mitglied. Ich empfehle das, weil ich es sinnvoll finde. Du entscheidest selbst.“</p></div>
            <p data-i18n="attP2">Und genauso klar muss sein: Es gibt keine garantierten Ergebnisse. Kein „sicher“, kein „risikofrei“, kein „du verdienst automatisch“. Das würde dem Bildungsanspruch widersprechen – und es würde Menschen in Erwartungen führen, die nicht seriös sind.</p>

            <p data-i18n="p4">Der Club will nicht, dass Menschen abhängig werden. Er will, dass Menschen verstehen. Und genau deshalb ist die Tätigkeit so reduziert: Nicht alles erklären, nicht alles in ein Gespräch pressen, nicht irgendein Produkt pushen. Sondern nur die Tür zeigen. Der Rest ist Bildung – und die beginnt immer mit einer freiwilligen Entscheidung.</p>

            <p data-i18n="p5">Wenn jemand den Club betritt, betritt er keinen Verkaufsraum. Er betritt einen Lernraum. Und wer das verstanden hat, kann auch empfehlen, ohne Druck zu machen. Weil dann klar ist: Es geht nicht um „abschließen“. Es geht um „Zugang zu Bildung“. Und das ist ein völlig anderer Ton.</p>

            <h3 data-i18n="motHead">Motivierender Abschluss</h3>
            <p data-i18n="mot1">Diese Art zu empfehlen nimmt dir die Last, „alles erklären zu müssen“. Du gibst nur Orientierung – und lässt dem anderen die Würde der eigenen Entscheidung.</p>
            <p data-i18n="mot2">Genau dadurch wirst du ruhiger, klarer und glaubwürdiger. Nicht weil du überzeugst – sondern weil du fair bleibst.</p>
            <p data-i18n="mot3">Wer lernen will, findet einen echten Bildungsraum. Wer aktiv werden will, findet eine klare, erlaubte Tätigkeit innerhalb dieses Rahmens. Und beide Wege starten gleich: mit Respekt, einem sauberen Zugang – und einer freien Entscheidung.</p>
          `
        },

        en: {
          title: "Recommending membership – learning space & activity path",
          html: `
            <h2 data-i18n="pathHead">Orientation path (top – short & clear)</h2>
            <p class="note" data-i18n="pathLead">What this page is about — as a simple flow for members:</p>
            <ol data-i18n="pathSteps">
              <li><strong>The club is a learning space.</strong><br/>Membership first means: access to education, orientation, and exchange.</li>
              <li><strong>Recommendation is an activity — not selling.</strong><br/>You don’t explain products. You don’t push. You simply show the door: “Take a look. Decide for yourself.”</li>
              <li><strong>Two paths run in parallel.</strong><br/><strong>Education path</strong> (learn only) and <strong>Activity path</strong> (also recommend).</li>
              <li><strong>Attitude & clarity.</strong><br/>No promises. No guarantees. No “automatic.” Always: “You decide.”</li>
            </ol>

            <div class="divider" role="separator" aria-hidden="true"></div>

            <h2 data-i18n="mainHead">LiquidityBooster • FSA Club • Academy</h2>

            <p data-i18n="p1">Inside the club there is one activity that is intentionally kept simple: recommending the membership. Not explaining products, not selling courses, not “convincing” people. Just this: telling someone that this club exists — and that it is meant for people who want to engage with money, education, digital decisions, and personal sovereignty.</p>

            <p data-i18n="p2">Why is it separated so clearly? Because an education system is only fair when people don’t have to persuade — they can simply provide orientation. A recommendation means: “Take a look and decide for yourself.” No promises, no guarantees, no pressure. If someone joins afterwards, it’s their own decision — and that matters, because education must always be voluntary. Otherwise it turns into manipulation.</p>

            <p data-i18n="p3">So that everyone can choose their own path inside the club, two clean paths exist in parallel — without contradiction.</p>

            <h3 data-i18n="w1Head">Path 1: Education path</h3>
            <p data-i18n="w1p1">People use membership as a calm entry into a new way of thinking. They read, understand connections, learn, ask questions, explore the academy, and build clarity step by step. They do not have to recommend anyone, they do not have to “perform.” They use the club as an educational space — like a university: you go there to understand, not to earn immediately.</p>

            <h3 data-i18n="w2Head">Path 2: Activity path</h3>
            <p data-i18n="w2p1">People also use membership as an option to become active — by recommending the membership. The same rule applies: it’s not about pushing someone, but about a conversation at eye level. The recommender speaks from their own experience. And the person who joins decides for themselves. If a membership results, compensation can be possible within the club logic — not as a promise, but as the outcome of an activity in a system that intentionally allows this sharing of information.</p>

            <h3 data-i18n="uniHead">The university picture</h3>
            <p data-i18n="uniP">The university picture helps: a university has students who only learn. And it has people who are additionally active — tutors, mentors, event helpers, ambassadors, sometimes also people who make new students aware of it. Learning remains the center, but roles exist that help the system grow and stay alive. It’s the same here: the club is first a learning space. Recommendation is simply one possible activity inside that frame.</p>

            <h3 data-i18n="attHead">The inner attitude matters</h3>
            <div class="quote"><p data-i18n="quote1">“I’m a member. I recommend it because I think it makes sense. You decide for yourself.”</p></div>
            <p data-i18n="attP2">And it must be equally clear: there are no guaranteed results. No “safe,” no “risk-free,” no “you automatically earn.” That would contradict the educational claim — and it would lead people into expectations that are not serious.</p>

            <p data-i18n="p4">The club does not want people to become dependent. It wants people to understand. That’s why the activity is so reduced: not explaining everything, not cramming everything into one conversation, not pushing any product — simply showing the door. The rest is education, and education always begins with a voluntary decision.</p>

            <p data-i18n="p5">When someone enters the club, they don’t enter a sales room. They enter a learning room. And once you understand that, you can recommend without pressure. Because it’s clear: this is not about “closing.” It’s about “access to education.” That’s a completely different tone.</p>

            <h3 data-i18n="motHead">Motivating closing</h3>
            <p data-i18n="mot1">This way of recommending removes the burden of “having to explain everything.” You simply provide orientation — and you leave the other person the dignity of their own decision.</p>
            <p data-i18n="mot2">That makes you calmer, clearer, and more credible. Not because you convince — but because you stay fair.</p>
            <p data-i18n="mot3">Those who want to learn find a real educational space. Those who want to be active find a clear, permitted activity inside that frame. And both paths start the same way: with respect, a clean entry — and a free decision.</p>
          `
        }
      };

      const lang = getLang();
      document.documentElement.setAttribute("lang", lang);

      const lnkDE = document.getElementById("lnkDE");
      const lnkEN = document.getElementById("lnkEN");
      if(lang === "de"){
        lnkDE.setAttribute("aria-current","true");
        lnkEN.removeAttribute("aria-current");
      }else{
        lnkEN.setAttribute("aria-current","true");
        lnkDE.removeAttribute("aria-current");
      }

      document.querySelectorAll('[data-i18n="title"]').forEach(function(el){
        el.textContent = i18n[lang].title;
      });

      const content = document.getElementById("content");
      content.innerHTML = i18n[lang].html;

    })();
  </script>
