  <style>

<body>
  <div class="wrap">
    <nav class="langbar" aria-label="Language switch">
      <a id="lnkDE" href="?lang=de" hreflang="de" lang="de" data-i18n="langDE">DE</a>
      <a id="lnkEN" href="?lang=en" hreflang="en" lang="en" data-i18n="langEN">EN</a>

    <header>
      <h1 data-i18n="title">Eine einfache Art, über den Club zu sprechen</h1>
    </header>

    <main id="content" aria-label="Content"></main>
  </div>

  <script>
    (function(){
      "use strict";

      function getLang(){
        const url = new URL(window.location.href);
        const q = (url.searchParams.get("lang") || "").toLowerCase().trim();
        if(q === "en" || q === "de") return q;
        const nav = (navigator.language || "de").toLowerCase();
        return nav.startsWith("en") ? "en" : "de";
      }

      const i18n = {
        de: {
          title: "Eine einfache Art, über den Club zu sprechen",
          paragraphs: [
            "Manche Gespräche über Geld, Bildung oder persönliche Entwicklung beginnen nicht mit langen Erklärungen, sondern mit einer einfachen Frage. Diese Frage soll keinen Druck erzeugen und auch keine Entscheidung erzwingen. Sie soll lediglich einen Gedanken anstoßen.",
            "Ein möglicher Einstieg ist eine sehr kleine Zahl, die jeder Mensch nachvollziehen kann: etwa zwanzig Cent pro Tag. Diese Zahl steht nicht im Mittelpunkt wegen ihres Betrags, sondern wegen der Frage dahinter.",
            "Die eigentliche Botschaft lautet:",
            "Wäre es einem Menschen selbst wert, jeden Tag einen sehr kleinen Betrag für die eigene Bildung und Orientierung zu investieren?",
            "Diese Frage zwingt niemanden zu einer Antwort. Sie öffnet lediglich einen Gedankenraum. Manche Menschen sagen sofort, dass sie dafür kein Interesse haben. Andere beginnen darüber nachzudenken, wie viel sie täglich für viele andere Dinge ausgeben, ohne es bewusst zu merken.",
            "Wenn Interesse entsteht, folgt meist kein langes Verkaufsgespräch, sondern ein einfacher nächster Schritt: ein Video ansehen. Dieses Video dient nicht dazu, jemanden zu überzeugen, sondern dazu, die Idee des Clubs in Ruhe zu erklären.",
            "Der Gedanke dahinter ist bewusst einfach gehalten. Statt in einem Gespräch alles erklären zu wollen, wird die Verantwortung an den Interessenten zurückgegeben. Jeder kann sich selbst ein Bild machen und danach entscheiden, ob das Thema für ihn interessant ist oder nicht.",
            "Das Gespräch bleibt dadurch leicht und respektvoll. Niemand muss jemanden überreden. Niemand muss sofort eine Entscheidung treffen. Die Empfehlung besteht lediglich darin, einen möglichen Zugang zu zeigen.",
            "Wer danach sagt, dass ihn das Thema nicht interessiert, hat eine klare Entscheidung getroffen. Wer neugierig wird, kann sich das Video ansehen und danach selbst entscheiden, ob er tiefer einsteigen möchte.",
            "Diese Form der Kommunikation folgt einem einfachen Prinzip: zuerst eine kleine Frage, dann eine Möglichkeit zur eigenen Information und danach eine freie Entscheidung.",
            "Sie funktioniert deshalb gut, weil sie nicht versucht, Menschen zu überzeugen, sondern ihnen lediglich eine Tür zeigt. Ob jemand durch diese Tür gehen möchte, entscheidet jeder Mensch selbst.",
            "Wenn ein solches Gespräch etwas persönlicher wird, kann die Botschaft auch direkter formuliert werden. Dabei geht es nicht darum, etwas zu verkaufen oder jemanden zu überreden, sondern darum, den Hintergrund der Frage verständlich zu machen.",
            "Die Haltung dahinter ist einfach: Viele Menschen treffen beim Thema Geld und finanzielle Entscheidungen wichtige Entscheidungen, ohne jemals wirklich erklärt bekommen zu haben, wie diese Dinge funktionieren. Genau deshalb geht es im Kern nicht darum, „reich zu werden“, sondern darum zu verstehen, was man eigentlich tut und warum man bestimmte Entscheidungen trifft.",
            "Aus diesem Gedanken entsteht die zentrale Frage:",
            "Zwanzig Cent am Tag – wäre man sich selbst das wert?",
            "Mehr steckt zunächst nicht dahinter. Wenn jemand darauf mit Nein antwortet, ist das völlig in Ordnung. Dann endet das Gespräch an dieser Stelle und das Thema ist erledigt.",
            "Wenn jemand hingegen sagt „Ja“ oder „Vielleicht“, folgt lediglich der nächste einfache Schritt: ein kurzes Video ansehen. Dieses Video kann in Ruhe betrachtet werden, ohne Druck, ohne Verkaufsgespräch und ohne Verpflichtung. Danach entscheidet jeder Mensch selbst, ob das Thema für ihn interessant ist oder nicht.",
            "Manche Menschen formulieren diesen Einstieg noch knapper und direkter. Dann lautet die Botschaft einfach: Es geht nicht darum, jemanden zu überzeugen. Es geht nur darum, eine einzige Frage zu stellen. Zwanzig Cent am Tag – wäre man sich selbst das wert? Wenn die Antwort Nein lautet, ist das völlig in Ordnung. Wenn die Antwort Ja lautet, kann man sich ein Video ansehen und danach selbst entscheiden.",
            "Andere führen das Gespräch etwas weicher. Sie erklären zunächst, dass sie niemandem etwas aufdrängen möchten, sondern lediglich bemerkt haben, dass viele Menschen bei Geldthemen falsche Entscheidungen treffen, weil ihnen die Grundlagen nie sauber erklärt wurden. Auch hier endet das Gespräch bei derselben Frage: Zwanzig Cent am Tag – wäre man sich selbst das wert? Wenn ja, kann man sich ein Video ansehen und danach selbst entscheiden.",
            "Wenn jemand das Video gesehen hat und danach fragt, wie der Club eigentlich funktioniert, lässt sich die Idee sehr einfach erklären.",
            "Der Club ist im Kern ein Bildungsraum. Menschen kommen hierher, um wirtschaftliche Zusammenhänge besser zu verstehen, Entscheidungen bewusster zu treffen und sich mit Themen zu beschäftigen, die im normalen Bildungssystem oft kaum erklärt werden.",
            "Dabei gibt es im Grunde zwei Wege, wie Mitglieder den Club nutzen können.",
            "Der erste Weg ist der Bildungsweg. Viele Menschen treten dem Club bei, weil sie lernen möchten. Sie lesen, beschäftigen sich mit den Inhalten der Akademie, tauschen sich mit anderen Mitgliedern aus und bauen Schritt für Schritt ein besseres Verständnis für Geld, Entscheidungen und wirtschaftliche Zusammenhänge auf. Für diese Menschen steht das Lernen im Mittelpunkt.",
            "Der zweite Weg entsteht erst danach und ist optional. Einige Mitglieder sagen irgendwann: Das hier ist interessant, davon sollten auch andere Menschen erfahren. Sie sprechen darüber in ihrem Umfeld und empfehlen die Mitgliedschaft weiter.",
            "Dabei geht es nicht darum, etwas zu verkaufen oder Menschen zu überzeugen. Die Empfehlung bedeutet lediglich, jemanden auf eine Möglichkeit aufmerksam zu machen. Wenn daraus eine Mitgliedschaft entsteht, kann im Rahmen der Clubstruktur eine Vergütung entstehen.",
            "Wichtig ist dabei immer der gleiche Grundsatz: Niemand muss diesen Weg gehen. Jeder entscheidet selbst, ob er den Club ausschließlich zum Lernen nutzt oder ob er zusätzlich darüber spricht und ihn weiterempfiehlt.",
            "Deshalb wird der Club manchmal mit einer Universität verglichen. An einer Universität gibt es Menschen, die einfach studieren und lernen. Und es gibt Menschen, die zusätzlich aktiv sind – zum Beispiel als Mentoren, Tutoren oder Botschafter.",
            "Beides gehört zusammen, aber niemand ist verpflichtet, eine bestimmte Rolle einzunehmen.",
            "Der Club funktioniert nach dem gleichen Prinzip. Er ist zuerst ein Bildungsraum. Alles andere entsteht erst danach, wenn Menschen selbst entscheiden, dass sie diese Idee weitergeben möchten.",
            "Und genau deshalb beginnt alles mit dieser kleinen Frage am Anfang. Nicht mit einem Verkaufsgespräch, sondern mit einer einfachen Einladung, sich etwas anzusehen und danach selbst zu entscheiden."
          ]
        },
        en: {
          title: "A simple way to talk about the club",
          paragraphs: [
            "Some conversations about money, education, or personal development don’t start with long explanations, but with a simple question. This question is not meant to create pressure or force a decision. It is only meant to open a thought.",
            "A possible entry point is a very small number that everyone can understand: around twenty cents per day. The number is not the focus because of its amount, but because of the question behind it.",
            "The core message is:",
            "Would it be worth it to someone to invest a very small amount each day in their own education and orientation?",
            "This question doesn’t force an answer. It simply opens a space to think. Some people immediately say they’re not interested. Others start reflecting on how much they spend every day on many other things without really noticing it.",
            "If interest appears, what usually follows is not a long sales conversation, but a simple next step: watch a video. The video is not meant to convince someone, but to explain the idea of the club calmly and clearly.",
            "The idea behind this is intentionally simple. Instead of trying to explain everything in one conversation, responsibility is returned to the interested person. Everyone can form their own view and then decide whether the topic is relevant to them or not.",
            "This keeps the conversation light and respectful. Nobody has to persuade anyone. Nobody has to make an immediate decision. The recommendation is simply to show a possible way in.",
            "If someone then says the topic isn’t interesting to them, they’ve made a clear decision. If someone becomes curious, they can watch the video and then decide for themselves whether they want to go deeper.",
            "This form of communication follows a simple principle: first a small question, then a chance to inform yourself, and then a free decision.",
            "It works well because it doesn’t try to convince people. It only shows a door. Whether someone wants to walk through that door is up to them.",
            "If a conversation becomes a bit more personal, the message can be phrased more directly. The point is not to sell something or to persuade someone, but to make the background of the question understandable.",
            "The attitude behind it is simple: many people make important financial decisions without ever being properly taught how these things work. That’s why the core is not about “getting rich,” but about understanding what you’re doing and why you’re making certain choices.",
            "From this thought comes the central question:",
            "Twenty cents a day — would you be worth that to yourself?",
            "At first, there is nothing more behind it than that. If someone answers no, that’s completely fine. The conversation ends there and the topic is done.",
            "If someone says “yes” or “maybe,” the next step is still simple: watch a short video. It can be watched calmly — no pressure, no sales talk, no obligation. Afterwards, everyone decides for themselves whether the topic is interesting or not.",
            "Some people phrase this entry even shorter and more directly. The message then is: this is not about convincing anyone. It’s only about asking one single question. Twenty cents a day — would you be worth that to yourself? If the answer is no, that’s completely fine. If the answer is yes, you can watch a video and then decide for yourself.",
            "Others lead the conversation more gently. They first explain that they don’t want to push anything, but have noticed that many people make wrong money decisions because the basics were never explained clearly. Here too, the conversation ends with the same question: twenty cents a day — would you be worth that to yourself? If yes, you can watch a video and then decide for yourself.",
            "If someone has watched the video and then asks how the club actually works, the idea can be explained very simply.",
            "At its core, the club is an educational space. People come here to better understand economic connections, to make decisions more consciously, and to engage with topics that are often barely explained in the normal education system.",
            "There are essentially two ways members can use the club.",
            "The first is the learning path. Many people join because they want to learn. They read, work through the academy’s content, exchange ideas with other members, and step by step build a better understanding of money, decisions, and economic relationships. For them, learning is the focus.",
            "The second path comes later and is optional. Some members eventually say: this is interesting — other people should know about it too. They talk about it in their environment and recommend membership.",
            "This is not about selling something or convincing people. The recommendation simply means making someone aware of a possibility. If that leads to a membership, compensation can arise within the club structure.",
            "The same principle always applies: nobody has to take this path. Everyone decides for themselves whether they use the club only for learning, or whether they also talk about it and recommend it.",
            "That’s why the club is sometimes compared to a university. At a university there are people who simply study and learn. And there are people who are additionally active — for example as mentors, tutors, or ambassadors.",
            "Both belong together, but nobody is obliged to take on a specific role.",
            "The club works the same way. First, it is an educational space. Everything else comes afterward — only if people decide for themselves that they want to pass the idea on.",
            "And that’s exactly why it all begins with that small question at the start — not with a sales talk, but with a simple invitation to look at something and then decide freely."
          ]
        }
      };

      const lang = getLang();
      document.documentElement.setAttribute("lang", lang);

      // Highlight active language
      const lnkDE = document.getElementById("lnkDE");
      const lnkEN = document.getElementById("lnkEN");
      if(lang === "de"){
        lnkDE.setAttribute("aria-current","true");
        lnkEN.removeAttribute("aria-current");
      }else{
        lnkEN.setAttribute("aria-current","true");
        lnkDE.removeAttribute("aria-current");
      }

      // Title
      document.querySelectorAll('[data-i18n="title"]').forEach(function(el){
        el.textContent = i18n[lang].title;
      });

      // Render content
      const content = document.getElementById("content");
      content.innerHTML = "";

      const question1DE = "Wäre es einem Menschen selbst wert, jeden Tag einen sehr kleinen Betrag für die eigene Bildung und Orientierung zu investieren?";
      const question1EN = "Would it be worth it to someone to invest a very small amount each day in their own education and orientation?";
      const question2DE = "Zwanzig Cent am Tag – wäre man sich selbst das wert?";
      const question2EN = "Twenty cents a day — would you be worth that to yourself?";

      i18n[lang].paragraphs.forEach(function(text, idx){
        const isQ1 = (lang === "de" ? text === question1DE : text === question1EN);
        const isQ2 = (lang === "de" ? text === question2DE : text === question2EN);

        if(isQ1 || isQ2){
          const box = document.createElement("div");
          box.className = "quote";
          const p = document.createElement("p");
          p.setAttribute("data-i18n", isQ2 ? "question_core" : "question_intro");
          p.textContent = text;
          box.appendChild(p);
          content.appendChild(box);
          return;
        }

        const p = document.createElement("p");
        p.setAttribute("data-i18n", "p_" + (idx+1));
        p.textContent = text;
        content.appendChild(p);
      });

    })();
  </script>
</body>
</html>
