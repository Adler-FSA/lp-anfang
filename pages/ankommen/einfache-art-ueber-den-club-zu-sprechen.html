  <script>
    (function(){
      "use strict";

      function getLang(){
        const url = new URL(window.location.href);
        const q = (url.searchParams.get("lang") || "").toLowerCase().trim();
        if(q === "en" || q === "de") return q;
        const nav = (navigator.language || "de").toLowerCase();
        return nav.startsWith("en") ? "en" : "de";
      }

      const i18n = {
        de: {
          title: "Eine einfache Art, über den Club zu sprechen",
          html: `
            <h2 data-i18n="introHead">Orientierungshilfe (für Mitglieder)</h2>
            <p class="note" data-i18n="introLead">So führst du ein Interessenten-Gespräch klar und respektvoll – ohne Druck:</p>
            <ol data-i18n="introSteps">
              <li><strong>Bedarfsanalyse (kurz &amp; sauber)</strong><br/>Du prüfst zuerst, ob überhaupt ein Thema da ist: Geld, Bildung, Orientierung, bessere Entscheidungen – ja oder nein.</li>
              <li><strong>20-Cent-Frage (Original-Beispiel)</strong><br/>
                <div class="quote"><p>„Ich habe nur eine Frage an Dich – wärst Du Dir selbst 20 Cent am Tag wert?“</p></div>
              </li>
              <li><strong>Video (statt Erklären)</strong><br/>Wenn Interesse da ist, erklärst du nicht alles. Du gibst nur den nächsten Schritt:<br/>„Wenn Du willst, schau Dir dazu einfach in Ruhe ein kurzes Video an – und danach entscheidest Du selbst.“</li>
              <li><strong>Eigene souveräne Entscheidung (Ja / Nein)</strong><br/>Danach ist die Sache klar: <strong>Ja, ich will mehr wissen.</strong> oder <strong>Nein, passt nicht.</strong> Beides ist okay – der Interessent entscheidet.</li>
            </ol>

            <div class="divider" role="separator" aria-hidden="true"></div>

            <h2 data-i18n="mainHead">Eine einfache Art, über den Club zu sprechen (für Interessenten-Gespräche)</h2>
            <p data-i18n="p1">Viele Gespräche scheitern nicht am Inhalt, sondern am Stil. Sobald es nach „Überzeugen“ klingt, geht der innere Widerstand hoch. Deshalb ist der beste Einstieg nicht ein Pitch, sondern eine einfache, respektvolle Struktur.</p>
            <p data-i18n="p2">Der Grundsatz ist: <strong>Du erklärst nicht alles im Gespräch.</strong> Du stellst eine kleine Frage, gibst eine Möglichkeit zur eigenen Information – und lässt dem Interessenten die freie Entscheidung.</p>

            <h3 data-i18n="s1">1) Starte mit einer kurzen Bedarfsanalyse</h3>
            <p data-i18n="p3">Du brauchst am Anfang keine Details. Es reicht eine ehrliche, einfache Frage, zum Beispiel:</p>
            <p data-i18n="p4">„Darf ich Dir eine kurze Frage stellen? Es geht um Geldthemen und finanzielle Bildung. Ist das grundsätzlich für Dich interessant – ja oder nein?“</p>
            <p data-i18n="p5">Wenn „Nein“ kommt, ist das Gespräch beendet. Freundlich, sauber, ohne Diskussion.</p>

            <h3 data-i18n="s2">2) Stelle die 20-Cent-Frage genau so</h3>
            <p data-i18n="p6">Wenn grundsätzlich Interesse da ist, geh nicht in Erklärungen. Stell nur diese eine Frage – als Beispiel in Originalsprache:</p>
            <div class="quote"><p data-i18n="q1">„Ich habe nur eine Frage an Dich – wärst Du Dir selbst 20 Cent am Tag wert?“</p></div>
            <p data-i18n="p7">Wenn der Interessent „Nein“ sagt: Thema erledigt. Wenn „Ja“ oder „Vielleicht“ kommt: nächster Schritt.</p>

            <h3 data-i18n="s3">3) Gib ein Video statt eines Verkaufsgesprächs</h3>
            <p data-i18n="p8">Jetzt kommt der entscheidende Teil: Du <strong>argumentierst nicht</strong>. Du <strong>diskutierst nicht</strong>. Du sagst sinngemäß:</p>
            <p data-i18n="p9">„Wenn Du willst, schau Dir dazu einfach in Ruhe ein kurzes Video an. Danach entscheidest Du selbst, ob das Thema für Dich interessant ist oder nicht.“</p>
            <p data-i18n="p10">So bleibt der Druck raus – und die Verantwortung liegt beim Interessenten.</p>

            <h3 data-i18n="s4">4) Lass die Entscheidung bewusst frei</h3>
            <p data-i18n="p11">Nach dem Video ist das Ziel nicht „Abschluss um jeden Preis“, sondern Klarheit: „Passt nicht“ → absolut okay. „Interessant“ → dann kann man die nächste Frage klären: <strong>Wie funktioniert der Club?</strong></p>

            <h3 data-i18n="pathsHead">Wenn die Frage kommt: „Wie funktioniert der Club?“ – Zwei Wege, ganz klar</h3>
            <p data-i18n="p12">Wenn jemand nach dem Video fragt, wie der Club genutzt wird, kannst du es ganz einfach in <strong>zwei Wege</strong> aufteilen:</p>

            <p data-i18n="path1"><strong>Weg 1: Euro-Weg (Verdienen steht im Vordergrund)</strong><br/>
            Einige Menschen interessieren sich nicht zuerst fürs Lernen. Sie wollen vor allem wissen, ob und wie man <strong>Euro verdienen</strong> kann. Für diese Menschen steht nicht der Inhalt im Mittelpunkt, sondern die Struktur: Man spricht über den Club, empfiehlt ihn weiter, und <strong>wenn dadurch Mitgliedschaften entstehen</strong>, kann innerhalb der Clubstruktur <strong>eine Vergütung</strong> möglich sein. Wichtig ist dabei die Einordnung: <strong>Ohne Mitglieder keine Vergütung.</strong> Und <strong>ohne eigene Aktivität passiert nichts.</strong> Es ist ein optionaler Weg für Menschen, die das Thema Empfehlung nutzen wollen.</p>

            <p data-i18n="path2"><strong>Weg 2: Bildungsweg (Lernen steht im Vordergrund)</strong><br/>
            Andere Menschen wollen <strong>nur lernen</strong>. Sie möchten Inhalte verstehen, Orientierung gewinnen und bessere Entscheidungen treffen. Sie nutzen den Club wie einen Bildungsraum: lesen, schauen, sich austauschen, Schritt für Schritt Grundlagen aufbauen. Für sie spielt Empfehlung oder Vergütung <strong>keine Rolle</strong>.</p>

            <p data-i18n="p13"><strong>Beides ist erlaubt.</strong> Niemand muss lernen, niemand muss empfehlen. Jeder wählt den Weg, der zu ihm passt.</p>

            <h3 data-i18n="motHead">Abschluss &amp; Motivation (warum diese Methode funktioniert)</h3>
            <p data-i18n="m1">Diese Vorgehensweise ist nicht „verkaufsstark“, sondern <strong>beziehungsstark</strong>. Sie funktioniert, weil sie drei Dinge gleichzeitig schützt:</p>
            <ol data-i18n="mList">
              <li><strong>Sie schützt den Interessenten.</strong><br/>Niemand wird gedrückt. Niemand muss im Gespräch sofort reagieren. Der Interessent bekommt Zeit, sich selbst zu informieren – und darf frei Nein sagen.</li>
              <li><strong>Sie schützt dich als Mitglied.</strong><br/>Du musst keine langen Erklärungen liefern und keine Diskussion gewinnen. Du führst nur sauber durch einen klaren Ablauf. Das reduziert Stress, Missverständnisse und unnötige Reibung.</li>
              <li><strong>Sie schützt die Qualität der Entscheidung.</strong><br/>Menschen bleiben eher dran, wenn sie selbst entschieden haben. Ein Video sorgt für gleiche Informationsbasis – und die Entscheidung danach ist sauber: Ja oder Nein.</li>
            </ol>
            <p data-i18n="m2">Und die zwei Wege machen es zusätzlich leicht: Wer <strong>Euro</strong> will, versteht schnell, worum es strukturell geht. Wer <strong>lernen</strong> will, bekommt genau dafür einen ruhigen Bildungsraum.</p>
            <p data-i18n="m3">So bleibt das Gespräch fair, kurz und zielgeführt – und du wirkst nicht wie jemand, der überzeugen will, sondern wie jemand, der <strong>einen sauberen Zugang zeigt</strong>.</p>
          `
        },

        en: {
          title: "A simple way to talk about the club",
          html: `
            <h2 data-i18n="introHead">Quick orientation (for members)</h2>
            <p class="note" data-i18n="introLead">This is how you lead a prospect conversation clearly and respectfully — without pressure:</p>
            <ol data-i18n="introSteps">
              <li><strong>Needs check (short &amp; clean)</strong><br/>First you check whether there is a topic at all: money, education, orientation, better decisions — yes or no.</li>
              <li><strong>20-cent question (original example)</strong><br/>
                <div class="quote"><p>“I only have one question for you — would you be worth 20 cents a day to yourself?”</p></div>
              </li>
              <li><strong>Video (instead of explaining)</strong><br/>If there’s interest, don’t explain everything. Give one next step:<br/>“If you want, just watch a short video in your own time — and then you decide for yourself.”</li>
              <li><strong>Sovereign decision (Yes / No)</strong><br/>After that it’s clear: <strong>Yes, I want to know more.</strong> or <strong>No, not for me.</strong> Both are fine — the prospect decides.</li>
            </ol>

            <div class="divider" role="separator" aria-hidden="true"></div>

            <h2 data-i18n="mainHead">A simple way to talk about the club (for prospect conversations)</h2>
            <p data-i18n="p1">Most conversations fail not because of the content, but because of the tone. The moment it sounds like “convincing,” resistance rises. That’s why the best entry is not a pitch, but a simple, respectful structure.</p>
            <p data-i18n="p2">The principle is: <strong>You don’t explain everything in the conversation.</strong> You ask a small question, offer a way to self-inform — and leave a free decision.</p>

            <h3 data-i18n="s1">1) Start with a short needs check</h3>
            <p data-i18n="p3">No details are needed at first. One honest question is enough, for example:</p>
            <p data-i18n="p4">“May I ask you a quick question? It’s about money topics and financial education. Is that generally interesting to you — yes or no?”</p>
            <p data-i18n="p5">If it’s “no,” the conversation ends. Friendly and clean.</p>

            <h3 data-i18n="s2">2) Ask the 20-cent question like this</h3>
            <p data-i18n="p6">If there is basic interest, don’t go into explanations. Ask only this one question (original example):</p>
            <div class="quote"><p data-i18n="q1">“I only have one question for you — would you be worth 20 cents a day to yourself?”</p></div>
            <p data-i18n="p7">If the prospect says “no,” the topic is done. If it’s “yes” or “maybe,” move to the next step.</p>

            <h3 data-i18n="s3">3) Give a video instead of a sales talk</h3>
            <p data-i18n="p8">Now the key part: don’t argue, don’t debate. Say something like:</p>
            <p data-i18n="p9">“If you want, just watch a short video in your own time. Afterwards, you decide for yourself whether it’s interesting to you or not.”</p>
            <p data-i18n="p10">No pressure — responsibility stays with the prospect.</p>

            <h3 data-i18n="s4">4) Keep the decision intentionally free</h3>
            <p data-i18n="p11">After the video, the goal is not “closing at all costs,” but clarity: “Not for me” → totally fine. “Interesting” → then you can answer the next question: <strong>How does the club work?</strong></p>

            <h3 data-i18n="pathsHead">If they ask: “How does the club work?” — Two clear paths</h3>
            <p data-i18n="p12">If someone asks after the video how the club is used, explain it as <strong>two clear paths</strong>:</p>

            <p data-i18n="path1"><strong>Path 1: The euro path (earning comes first)</strong><br/>
            Some people are not interested in learning first. They mainly want to know whether and how they can <strong>earn euros</strong>. For them, the structure is the focus: they talk about the club, recommend it, and <strong>if memberships result</strong>, compensation can be possible within the club structure. Important framing: <strong>No members, no compensation.</strong> And <strong>without your own activity, nothing happens.</strong> It’s an optional path for people who want referrals as their main motive.</p>

            <p data-i18n="path2"><strong>Path 2: The education path (learning comes first)</strong><br/>
            Other people want to <strong>learn only</strong>. They want understanding, orientation, and better decision-making. They use the club as an educational space: read, watch, exchange ideas, build fundamentals step by step. For them, referrals or compensation <strong>don’t matter</strong>.</p>

            <p data-i18n="p13"><strong>Both are allowed.</strong> Nobody must learn, nobody must refer. Everyone chooses the path that fits them.</p>

            <h3 data-i18n="motHead">Closing &amp; motivation (why this method works)</h3>
            <p data-i18n="m1">This approach isn’t “sales-strong” — it’s <strong>relationship-strong</strong>. It works because it protects three things at once:</p>
            <ol data-i18n="mList">
              <li><strong>It protects the prospect.</strong><br/>No pressure. No instant reaction required. The prospect gets time to self-inform — and can freely say no.</li>
              <li><strong>It protects you as a member.</strong><br/>You don’t need long explanations or to “win” debates. You simply guide a clear process. That reduces stress, misunderstandings, and friction.</li>
              <li><strong>It protects the quality of the decision.</strong><br/>People stick with things more often when they decide for themselves. A video creates a shared information base — and the decision afterwards is clean: yes or no.</li>
            </ol>
            <p data-i18n="m2">And the two paths make it even easier: if someone wants <strong>euros</strong>, they quickly understand the structure. If someone wants to <strong>learn</strong>, they get a calm educational space.</p>
            <p data-i18n="m3">This keeps the conversation fair, short, and goal-oriented — and you don’t sound like someone trying to convince, but like someone <strong>showing a clean way in</strong>.</p>
          `
        }
      };

      const lang = getLang();
      document.documentElement.setAttribute("lang", lang);

      // Highlight active language
      const lnkDE = document.getElementById("lnkDE");
      const lnkEN = document.getElementById("lnkEN");
      if(lang === "de"){
        lnkDE.setAttribute("aria-current","true");
        lnkEN.removeAttribute("aria-current");
      }else{
        lnkEN.setAttribute("aria-current","true");
        lnkDE.removeAttribute("aria-current");
      }

      // Title
      document.querySelectorAll('[data-i18n="title"]').forEach(function(el){
        el.textContent = i18n[lang].title;
      });

      // Content
      var content = document.getElementById("content");
      content.innerHTML = i18n[lang].html;

    })();
  </script>
