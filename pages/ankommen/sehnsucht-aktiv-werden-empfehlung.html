  <script>
    (function(){
      "use strict";

      function getLang(){
        const url = new URL(window.location.href);
        const q = (url.searchParams.get("lang") || "").toLowerCase().trim();
        if(q === "en" || q === "de") return q;
        const nav = (navigator.language || "de").toLowerCase();
        return nav.startsWith("en") ? "en" : "de";
      }

      const i18n = {
        de: {
          title: "Sehnsucht aktiv zu werden – Empfehlung (ohne Verkaufsgefühl)",
          html: `
            <h2 data-i18n="brandHead">LiquidityBooster • FSA Club • Akademie</h2>

            <h2 data-i18n="pathHead">Orientierung (oben – kurz & klar)</h2>
            <ol data-i18n="pathSteps">
              <li><strong>Du bist Mitglied, kein Verkäufer.</strong></li>
              <li><strong>Du erklärst nicht alles.</strong> Du zeigst nur die Tür.</li>
              <li><strong>Der andere entscheidet.</strong> Immer.</li>
              <li><strong>Aktivität heißt: Haltung + Klarheit.</strong> Keine Versprechen, kein Druck.</li>
            </ol>

            <div class="divider" role="separator" aria-hidden="true"></div>

            <h3 data-i18n="hWhy">Warum diese Seite existiert</h3>
            <p data-i18n="p1">Viele Mitglieder spüren nach einer Zeit etwas Neues: Sie verstehen mehr – und sie merken, dass andere Menschen in ihrem Umfeld genau an den Punkten hängen, die sie selbst lange nicht verstanden haben.</p>
            <p data-i18n="p2">Dann entsteht ein Impuls, der nichts mit „Pushen“ zu tun hat, sondern mit Sinn:</p>
            <div class="quote"><p data-i18n="q1">„Wenn mir das geholfen hätte – hätte ich es früher wissen wollen?“</p></div>
            <p data-i18n="p3">Aus dieser Frage kommt die Sehnsucht, aktiv zu werden. Nicht laut. Nicht aggressiv. Sondern sauber, respektvoll und menschlich.</p>

            <h3 data-i18n="hMeaning">Was „Empfehlung“ im Club bedeutet</h3>
            <p data-i18n="p4">Empfehlung ist im Club bewusst klein gehalten. Nicht Produkte erklären. Nicht Kurse verkaufen. Nicht Menschen überzeugen.</p>
            <p data-i18n="p5">Empfehlung bedeutet nur:</p>
            <div class="quote"><p data-i18n="q2">„Es gibt diesen Club. Schau ihn dir an. Entscheide selbst.“</p></div>
            <p data-i18n="p6">Und genau deshalb passt Empfehlung zu einem Bildungsraum: Weil Bildung nur dann fair ist, wenn sie freiwillig bleibt.</p>

            <h3 data-i18n="hWhyWorks">Warum Empfehlung für viele der richtige Einstieg in Aktivität ist</h3>
            <p data-i18n="p7">Viele Menschen haben keine Lust auf „Verkauf“. Sie wollen nicht diskutieren, nicht drängen, nicht argumentieren.</p>
            <p data-i18n="p8">Empfehlung im Club ist deshalb ein anderer Weg: Du musst nicht stark reden. Du musst nur ehrlich sein.</p>
            <p data-i18n="p9">Denn das Entscheidende ist nicht dein Talent. Das Entscheidende ist deine Haltung:</p>
            <ul data-i18n="list1">
              <li>Du übernimmst Verantwortung für Klarheit.</li>
              <li>Du respektierst die Freiheit des anderen.</li>
              <li>Du bleibst sauber in deinen Aussagen.</li>
            </ul>
            <p data-i18n="p10">So entsteht Aktivität ohne Druck.</p>

            <h3 data-i18n="hAtt">Die innere Haltung, die alles verändert</h3>
            <p data-i18n="p11">Wenn du empfiehlst, sagst du im Kern:</p>
            <div class="quote"><p data-i18n="q3">„Ich bin Mitglied. Ich empfehle das, weil ich es sinnvoll finde. Du entscheidest selbst.“</p></div>
            <p data-i18n="p12">Das ist der Ton. Nicht „Du musst“. Nicht „Du verpasst was“. Nicht „Schnell“. Sondern: Würde, Freiheit, Klarheit.</p>
            <p data-i18n="p13">Und damit bist du automatisch glaubwürdiger, weil du keine Erwartung verkaufst.</p>

            <h3 data-i18n="hNot">Was du nicht tun musst (und auch nicht solltest)</h3>
            <p data-i18n="p14">Viele neue Mitglieder glauben, Aktivität heißt: alles erklären, alle Fragen beantworten, Diskussionen führen, Ergebnisse versprechen, Menschen „mitnehmen“.</p>
            <p data-i18n="p15">Das Gegenteil ist richtig.</p>
            <p data-i18n="p16">Du musst nicht alles erklären. Du darfst sogar bewusst sagen:</p>
            <div class="quote"><p data-i18n="q4">„Das erklärt ein kurzes Video besser als ich in einem Gespräch.“</p></div>
            <p data-i18n="p17">Das ist keine Schwäche. Das ist Professionalität.</p>

            <h3 data-i18n="hFlow">Der saubere Ablauf – wenn du aktiv werden willst</h3>
            <p data-i18n="p18">Wenn du aktiv werden möchtest, reicht ein klarer, ruhiger Ablauf:</p>
            <ol data-i18n="flowList">
              <li><strong>Bedarfscheck:</strong> „Interessiert dich Geld &amp; finanzielle Bildung grundsätzlich – ja oder nein?“</li>
              <li><strong>Die eine Frage:</strong> „Ich habe nur eine Frage an Dich – wärst Du Dir selbst 20 Cent am Tag wert?“</li>
              <li><strong>Video statt Druck:</strong> „Wenn du willst, schau dir ein kurzes Video an – und danach entscheidest du selbst.“</li>
              <li><strong>Freie Entscheidung:</strong> Ja oder Nein. Beides okay.</li>
            </ol>
            <p data-i18n="p19">Das ist nicht „Sales“. Das ist ein sauberer Zugang zu Bildung.</p>

            <h3 data-i18n="hTwoWays">Zwei Wege bleiben trotzdem parallel – und das ist wichtig</h3>
            <p data-i18n="p20">Nicht jeder, der Mitglied ist, will empfehlen. Und nicht jeder, der empfiehlt, will „groß“ sein.</p>
            <p data-i18n="p21">Darum gilt:</p>
            <ul data-i18n="list2">
              <li>Manche sind im Club, um <strong>nur zu lernen</strong>.</li>
              <li>Manche sind im Club, um <strong>zusätzlich aktiv</strong> zu werden und die Mitgliedschaft zu empfehlen.</li>
            </ul>
            <p data-i18n="p22"><strong>Beides ist legitim. Beides ist freiwillig.</strong> Und niemand muss sich rechtfertigen.</p>

            <h3 data-i18n="hFeel">Warum Aktivität sich trotzdem gut anfühlen kann</h3>
            <p data-i18n="p23">Weil sie nicht aus Druck kommt, sondern aus innerer Klarheit.</p>
            <p data-i18n="p24">Du merkst, dass du stabiler wirst. Du merkst, dass du in Gesprächen ruhiger bleibst. Du merkst, dass du nicht mehr überreden musst.</p>
            <p data-i18n="p25">Und genau das ist die Sehnsucht, von der viele sprechen: Nicht „mehr machen“, sondern <strong>ehrlicher werden</strong>.</p>
            <p data-i18n="p26">Aktivität ist dann kein Theater. Sondern ein stiller Beweis, dass du aufrecht gehst.</p>

            <h3 data-i18n="hClose">Abschluss (motivierender Gedanke)</h3>
            <p data-i18n="c1">Wenn du aktiv werden willst, musst du nicht „jemand anders“ werden. Du musst nur den Mut haben, so zu sprechen, wie es sich richtig anfühlt: klar, ehrlich, respektvoll.</p>
            <p data-i18n="c2">Empfehlung im Club ist kein Druck auf andere. Es ist eine Einladung zur eigenen Entscheidung.</p>
            <p data-i18n="c3">Und wenn du das verstanden hast, wird Aktivität leicht: Du zeigst eine Tür. Du lässt Freiheit. Und du bleibst sauber.</p>
            <div class="quote"><p data-i18n="c4">Das ist nicht laut. Aber es ist stark.</p></div>
          `
        },

        en: {
          title: "The urge to become active – recommendation (without a sales vibe)",
          html: `
            <h2 data-i18n="brandHead">LiquidityBooster • FSA Club • Academy</h2>

            <h2 data-i18n="pathHead">Orientation (top – short & clear)</h2>
            <ol data-i18n="pathSteps">
              <li><strong>You’re a member, not a salesperson.</strong></li>
              <li><strong>You don’t explain everything.</strong> You simply show the door.</li>
              <li><strong>The other person decides.</strong> Always.</li>
              <li><strong>Activity means: attitude + clarity.</strong> No promises, no pressure.</li>
            </ol>

            <div class="divider" role="separator" aria-hidden="true"></div>

            <h3 data-i18n="hWhy">Why this page exists</h3>
            <p data-i18n="p1">After a while, many members notice something new: they understand more — and they see that people around them are stuck at exactly the points they themselves didn’t understand for a long time.</p>
            <p data-i18n="p2">Then a different impulse appears — not “pushing,” but meaning:</p>
            <div class="quote"><p data-i18n="q1">“If this would have helped me, would I have wanted to know it earlier?”</p></div>
            <p data-i18n="p3">From that question comes the urge to become active. Not loud. Not aggressive. But clean, respectful, and human.</p>

            <h3 data-i18n="hMeaning">What “recommendation” means in the club</h3>
            <p data-i18n="p4">Recommendation is intentionally kept small. Not explaining products. Not selling courses. Not convincing people.</p>
            <p data-i18n="p5">Recommendation means only this:</p>
            <div class="quote"><p data-i18n="q2">“This club exists. Take a look. Decide for yourself.”</p></div>
            <p data-i18n="p6">That’s exactly why it fits an educational space: education is only fair when it remains voluntary.</p>

            <h3 data-i18n="hWhyWorks">Why recommendation is the right entry into activity for many</h3>
            <p data-i18n="p7">Many people don’t want “selling.” They don’t want debates, pressure, or arguments.</p>
            <p data-i18n="p8">That’s why recommendation is different here: you don’t need strong rhetoric. You only need honesty.</p>
            <p data-i18n="p9">Because what matters isn’t talent. What matters is attitude:</p>
            <ul data-i18n="list1">
              <li>You take responsibility for clarity.</li>
              <li>You respect the other person’s freedom.</li>
              <li>You keep your statements clean and grounded.</li>
            </ul>
            <p data-i18n="p10">That’s how activity happens without pressure.</p>

            <h3 data-i18n="hAtt">The inner attitude that changes everything</h3>
            <p data-i18n="p11">When you recommend, what you say at the core is:</p>
            <div class="quote"><p data-i18n="q3">“I’m a member. I recommend this because I think it’s meaningful. You decide for yourself.”</p></div>
            <p data-i18n="p12">That’s the tone. Not “you must.” Not “you’re missing out.” Not “fast.” But: dignity, freedom, clarity.</p>
            <p data-i18n="p13">And that’s why you sound more credible — because you’re not selling expectations.</p>

            <h3 data-i18n="hNot">What you don’t have to do (and shouldn’t)</h3>
            <p data-i18n="p14">Many new members think activity means: explaining everything, answering every question, debating, promising results, “pulling people along.”</p>
            <p data-i18n="p15">The opposite is true.</p>
            <p data-i18n="p16">You don’t have to explain everything. You can even say plainly:</p>
            <div class="quote"><p data-i18n="q4">“A short video explains it better than I could in a conversation.”</p></div>
            <p data-i18n="p17">That’s not weakness. That’s professionalism.</p>

            <h3 data-i18n="hFlow">The clean flow — if you want to become active</h3>
            <p data-i18n="p18">If you want to be active, a calm, clear flow is enough:</p>
            <ol data-i18n="flowList">
              <li><strong>Needs check:</strong> “Are money topics and financial education generally interesting to you — yes or no?”</li>
              <li><strong>The one question:</strong> “I only have one question for you — would you be worth 20 cents a day to yourself?”</li>
              <li><strong>Video instead of pressure:</strong> “If you want, watch a short video — and then decide for yourself.”</li>
              <li><strong>Free decision:</strong> yes or no. Both are okay.</li>
            </ol>
            <p data-i18n="p19">That’s not “sales.” It’s a clean entry into education.</p>

            <h3 data-i18n="hTwoWays">Two paths still run in parallel — and that matters</h3>
            <p data-i18n="p20">Not everyone wants to recommend. And not everyone who recommends wants to be “big.”</p>
            <p data-i18n="p21">So this remains true:</p>
            <ul data-i18n="list2">
              <li>Some are in the club to <strong>learn only</strong>.</li>
              <li>Some are in the club to become <strong>additionally active</strong> and recommend membership.</li>
            </ul>
            <p data-i18n="p22"><strong>Both are legitimate. Both are voluntary.</strong> No one has to justify their choice.</p>

            <h3 data-i18n="hFeel">Why activity can still feel good</h3>
            <p data-i18n="p23">Because it doesn’t come from pressure — it comes from inner clarity.</p>
            <p data-i18n="p24">You notice you become steadier. You stay calmer in conversations. You no longer feel the need to persuade.</p>
            <p data-i18n="p25">That’s the urge many people mean: not “doing more,” but becoming <strong>more honest</strong>.</p>
            <p data-i18n="p26">Activity then isn’t theater. It’s a quiet proof that you stand upright.</p>

            <h3 data-i18n="hClose">Closing (motivating thought)</h3>
            <p data-i18n="c1">If you want to become active, you don’t have to become “someone else.” You only need the courage to speak in the way that feels right: clear, honest, respectful.</p>
            <p data-i18n="c2">Recommendation in the club is not pressure on others. It’s an invitation to their own decision.</p>
            <p data-i18n="c3">And once you understand that, activity becomes light: you show a door, you leave freedom, and you stay clean.</p>
            <div class="quote"><p data-i18n="c4">It’s not loud. But it’s strong.</p></div>
          `
        }
      };

      const lang = getLang();

        lnkEN.removeAttribute("aria-current");

        lnkEN.setAttribute("aria-current","true");
        lnkDE.removeAttribute("aria-current");

        el.textContent = i18n[lang].title;

      document.getElementById("content").innerHTML = i18n[lang].html;
