    (function(){

        de: {
          title: "Erste Schritte im Club",
          html: `
            <h2 data-i18n="pathHead">Orientierungspfad (oben – kurz & klar)</h2>
            <p class="note" data-i18n="pathLead">Wenn du neu bist: So findest du ruhig deinen Start – ohne Hektik.</p>
            <ol data-i18n="pathSteps">
              <li><strong>Willkommen & Überblick.</strong><br/>Du bist in einem Lernraum – nicht in einem Verkaufsraum.</li>
              <li><strong>Verstehen vor Handeln.</strong><br/><span style="font-weight:800">Nimm dir Zeit. Verstehen kommt vor Handeln.</span></li>
              <li><strong>Schrittweise Orientierung.</strong><br/>Lerne Inhalte kennen, verstehe das System, dann entscheide deinen Weg.</li>
              <li><strong>Dein Tempo zählt.</strong><br/>Kein Rennen. Kein Muss. Du bestimmst Rhythmus und Tiefe selbst.</li>
            </ol>

            <div class="divider" role="separator" aria-hidden="true"></div>

            <h2 data-i18n="brandHead">LiquidityBooster • FSA Club • Akademie</h2>

            <h3 data-i18n="welcomeHead">Willkommen im Club</h3>
            <p data-i18n="p1">Herzlich willkommen im LiquidityBooster, im FSA Club und in der Akademie.</p>
            <p data-i18n="p2">Mit deiner Mitgliedschaft hast du Zugang zu einer Plattform erhalten, die sich mit wirtschaftlicher Bildung, persönlicher Entwicklung und gemeinschaftlichem Lernen beschäftigt. Viele Menschen betreten diesen Raum zum ersten Mal und fragen sich zunächst: „Wo beginne ich eigentlich?“</p>
            <p data-i18n="p3">Diese Seite soll dir dabei helfen, dich im Club zu orientieren und die ersten Schritte in Ruhe zu gehen.</p>

            <div class="quote"><p data-i18n="rule">Nimm dir Zeit. Verstehen kommt vor Handeln.</p></div>

            <h3 data-i18n="s1Head">Schritt 1 – Verstehe den Charakter des Clubs</h3>
            <p data-i18n="s1p1">Der Club ist kein klassisches Produkt und auch kein System, das auf schnelle Ergebnisse ausgelegt ist.</p>
            <p data-i18n="s1p2">Er ist eine Kombination aus:</p>
            <ul data-i18n="s1List">
              <li>einer Bildungsplattform,</li>
              <li>einer Community zum Austausch von Erfahrungen</li>
              <li>und einer Struktur, über die Mitglieder Angebote nutzen oder weiterempfehlen können.</li>
            </ul>
            <p data-i18n="s1p3">Der eigentliche Wert entsteht nicht durch das bloße „Dabei sein“, sondern durch das Lernen, das Verstehen von Zusammenhängen und die eigene Umsetzung.</p>

            <h3 data-i18n="s2Head">Schritt 2 – Lerne die Inhalte kennen</h3>
            <p data-i18n="s2p1">Der erste sinnvolle Schritt ist immer, dich mit den Inhalten der Plattform vertraut zu machen.</p>
            <p data-i18n="s2p2">Dazu gehören insbesondere:</p>
            <ul data-i18n="s2List">
              <li>die Inhalte der Akademie,</li>
              <li>die Grundlagen zur finanziellen Bildung,</li>
              <li>die Erläuterungen zum System und</li>
              <li>die Materialien zur persönlichen Orientierung.</li>
            </ul>
            <p data-i18n="s2p3">Viele Mitglieder beginnen beispielsweise damit, das Buch „Die Rückeroberung der eigenen Souveränität“ zu lesen, um ein grundlegendes Verständnis für die Ideen hinter der Plattform zu entwickeln.</p>
            <p data-i18n="s2p4">Nimm dir Zeit für diesen Schritt. Wer die Inhalte versteht, trifft später bessere Entscheidungen.</p>

            <h3 data-i18n="s3Head">Schritt 3 – Verstehe das System</h3>
            <p data-i18n="s3p1">Innerhalb des Clubs gibt es verschiedene Bereiche.</p>
            <p data-i18n="s3p2">Dazu gehören unter anderem:</p>
            <ul data-i18n="s3List">
              <li>Lernangebote der Akademie,</li>
              <li>Veranstaltungen wie Weekend-Setups,</li>
              <li>die Communitystruktur sowie</li>
              <li>der Club-Marktplatz.</li>
            </ul>
            <p data-i18n="s3p3">Das System ist so aufgebaut, dass Lernen, Austausch und praktische Umsetzung miteinander verbunden sind.</p>
            <p data-i18n="s3p4">Du entscheidest selbst, welchen Weg du gehst und in welchem Tempo du dich mit den einzelnen Bereichen beschäftigst.</p>

            <h3 data-i18n="s4Head">Schritt 4 – Entscheide deinen persönlichen Weg</h3>
            <p data-i18n="s4p1">Im Club gibt es grundsätzlich zwei mögliche Wege.</p>
            <p data-i18n="s4p2">Einige Mitglieder nutzen den Club vor allem, um zu lernen und sich mit wirtschaftlichen Themen auseinanderzusetzen.</p>
            <p data-i18n="s4p3">Andere entscheiden sich zusätzlich dazu, ihre Erfahrungen zu teilen und den Club weiterzuempfehlen.</p>
            <p data-i18n="s4p4"><strong>Beides ist möglich. Beides ist freiwillig.</strong></p>
            <p data-i18n="s4p5">Der Club gibt keine Vorgaben, welchen Weg du gehen musst.</p>

            <h3 data-i18n="s5Head">Schritt 5 – Empfehlungen verstehen</h3>
            <p data-i18n="s5p1">Wenn Mitglieder den Club weiterempfehlen, geschieht das auf Basis persönlicher Erfahrung.</p>
            <p data-i18n="s5p2">Diese Empfehlungen sind keine Arbeit im klassischen Sinne, sondern freiwillige Gespräche zwischen Menschen.</p>
            <p data-i18n="s5p3">Es gibt dabei keine Verpflichtung, andere Menschen anzusprechen oder zu überzeugen.</p>
            <p data-i18n="s5p4">Wichtig ist nur, dass Gespräche ehrlich und transparent geführt werden.</p>
            <p data-i18n="s5p5">Der Club verspricht keine garantierten Ergebnisse und erwartet auch von seinen Mitgliedern, dass sie keine unrealistischen Erwartungen erzeugen.</p>

            <h3 data-i18n="s6Head">Schritt 6 – Veranstaltungen und Live-Formate</h3>
            <p data-i18n="s6p1">Neben den Inhalten der Akademie gibt es Veranstaltungen, Workshops und sogenannte Weekend-Setups.</p>
            <p data-i18n="s6p2">Diese Formate dienen dazu, Wissen zu vertiefen, Fragen zu klären und Erfahrungen auszutauschen.</p>
            <p data-i18n="s6p3">Viele Mitglieder empfinden diese Veranstaltungen als besonders wertvoll, weil hier Gespräche entstehen, die über reine Theorie hinausgehen.</p>
            <p data-i18n="s6p4">Auch hier gilt: Du entscheidest selbst, wann und ob du an solchen Formaten teilnehmen möchtest.</p>

            <h3 data-i18n="s7Head">Schritt 7 – Der Club-Marktplatz</h3>
            <p data-i18n="s7p1">Ein weiterer Bestandteil des Systems ist der Club-Marktplatz.</p>
            <p data-i18n="s7p2">Hier können Mitglieder eigene Angebote innerhalb der Community sichtbar machen.</p>
            <p data-i18n="s7p3">Der Marktplatz soll Menschen miteinander verbinden und Möglichkeiten schaffen, Dienstleistungen oder Produkte innerhalb der Community zu nutzen.</p>
            <p data-i18n="s7p4">Der Club stellt dabei lediglich die Plattformstruktur bereit. Verträge entstehen immer zwischen Käufer und Anbieter.</p>

            <h3 data-i18n="s8Head">Schritt 8 – Nimm dir Zeit</h3>
            <p data-i18n="s8p1">Viele Menschen sind heute daran gewöhnt, sofort Ergebnisse zu erwarten.</p>
            <p data-i18n="s8p2">Der Club funktioniert bewusst anders.</p>
            <p data-i18n="s8p3">Er ist ein Raum für Entwicklung, Lernen und Erfahrung.</p>
            <p data-i18n="s8p4">Wer sich Zeit nimmt, Inhalte versteht und seine eigenen Entscheidungen bewusst trifft, hat langfristig deutlich mehr von der Plattform.</p>

            <h3 data-i18n="closeHead">Ein letzter Gedanke zum Start</h3>
            <p data-i18n="c1">Der Club möchte Menschen nicht in Abhängigkeiten führen, sondern ihnen helfen, Zusammenhänge besser zu verstehen.</p>
            <p data-i18n="c2">Bildung bedeutet hier nicht, fertige Antworten zu liefern, sondern die Fähigkeit zu entwickeln, selbst bessere Fragen zu stellen.</p>
            <p data-i18n="c3">Wenn du mit dieser Haltung in den Club startest, wirst du Schritt für Schritt verstehen, welchen Weg du für dich gehen möchtest.</p>

            <div class="quote"><p data-i18n="welcomeClose">Willkommen im Club</p></div>
          `
        },

            <div class="divider" role="separator" aria-hidden="true"></div>

            <h2 data-i18n="brandHead">LiquidityBooster • FSA Club • Academy</h2>

            <h3 data-i18n="welcomeHead">Welcome to the club</h3>
            <p data-i18n="p1">Welcome to LiquidityBooster, the FSA Club, and the Academy.</p>
            <p data-i18n="p2">With your membership, you have gained access to a platform focused on economic education, personal development, and shared learning. Many people enter this space for the first time and wonder: “Where do I even begin?”</p>
            <p data-i18n="p3">This page helps you orient yourself in the club and take your first steps calmly.</p>

            <div class="quote"><p data-i18n="rule">Take your time. Understanding comes before action.</p></div>

            <p data-i18n="s1p1">The club is not a classic product and not a system designed for quick results.</p>
            <p data-i18n="s1p2">It is a combination of:</p>
            <ul data-i18n="s1List">
              <li>an education platform,</li>

            <p data-i18n="s2p3">Many members start by reading the book “The Reclaiming of One’s Own Sovereignty” to build a basic understanding of the ideas behind the platform.</p>

            <h3 data-i18n="s3Head">Step 3 – Understand the system</h3>
            <p data-i18n="s3p1">There are different areas inside the club.</p>
            <p data-i18n="s3p2">These include, among others:</p>
            <ul data-i18n="s3List">
              <li>Academy learning offers,</li>
              <li>events such as weekend setups,</li>

              <li>and the club marketplace.</li>

            <p data-i18n="s3p3">The system is built so that learning, exchange, and practical implementation are connected.</p>
            <p data-i18n="s3p4">You decide which path you take and at what pace you explore each area.</p>

            <p data-i18n="s6p4">Here too: you decide if and when you want to participate.</p>

            <p data-i18n="s7p3">The marketplace connects people and creates ways to use services or products inside the community.</p>
