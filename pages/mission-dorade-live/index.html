<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>Mission Dorade – Geführte Club-Präsentation</title>
<style>
:root{--mint:#00a7ad;--mint-soft:#e9fafb;--magenta:#c6006f;--magenta-soft:#fff0f7;--navy:#132238;--ink:#1c2939;--muted:#67778a;--line:#dce6ec;--white:#fff;--shadow:0 24px 60px rgba(19,34,56,.14)}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:#f4f8fa;color:var(--ink)}button{font:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
.app{width:100%;height:100vh;height:100dvh;display:grid;grid-template-rows:auto auto minmax(0,1fr) auto;gap:10px;padding:12px;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 16px;background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 24px rgba(19,34,56,.06)}
.brand strong{display:block;color:var(--navy);font-size:1.15rem}.brand span{display:block;margin-top:3px;color:var(--muted);font-size:.88rem}
.top-actions{display:flex;gap:8px}.icon-btn{min-height:42px;padding:0 14px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--navy);font-weight:800}
.stage{position:relative;width:100%;height:100%;min-width:0;min-height:0;overflow:hidden;background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);container-type:size}
.scene{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .5s ease,visibility .5s ease;background:#fff}
.scene.is-active{opacity:1;visibility:visible;pointer-events:auto}
.scene-media{position:relative;overflow:hidden;min-height:100%}.scene-media img{width:100%;height:100%;object-fit:cover;display:block;transform:scale(1.01);transition:transform 8s ease}.scene.is-active .scene-media img{transform:scale(1.055)}
.scene-media::after{content:"";position:absolute;inset:0;pointer-events:none}
.layout-image-right .scene-media{grid-column:2;grid-row:1}.layout-image-right .scene-copy{grid-column:1;grid-row:1}.layout-image-right .scene-media::after{background:linear-gradient(90deg,#fff 0%,rgba(255,255,255,.9) 8%,transparent 36%)}
.layout-image-left .scene-media{grid-column:1;grid-row:1}.layout-image-left .scene-copy{grid-column:2;grid-row:1}.layout-image-left .scene-media::after{background:linear-gradient(270deg,#fff 0%,rgba(255,255,255,.9) 8%,transparent 36%)}
.layout-center{grid-template-columns:1fr}.layout-center .scene-media{grid-column:1;grid-row:1}.layout-center .scene-media::after{background:linear-gradient(90deg,rgba(255,255,255,.97),rgba(255,255,255,.76) 46%,rgba(255,255,255,.12) 78%)}.layout-center .scene-copy{grid-column:1;grid-row:1;width:min(52%,760px);z-index:2}
.scene-copy{position:relative;z-index:2;display:flex;min-width:0;min-height:0;flex-direction:column;justify-content:center;padding:clamp(18px,min(3.4vw,4vh),58px);overflow:hidden;background:linear-gradient(135deg,#fff 0%,#fbfeff 60%,var(--mint-soft) 130%)}
.scene-phase{position:absolute;top:24px;left:clamp(30px,5vw,76px);color:var(--muted);font-size:.78rem;font-weight:900;text-transform:uppercase;letter-spacing:.13em}
.scene-eyebrow{display:inline-flex;align-self:flex-start;margin-bottom:14px;padding:8px 12px;border-radius:999px;background:var(--mint-soft);color:var(--mint);font-size:.78rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
h1{margin:0;color:var(--navy);font-size:clamp(1.85rem,min(4vw,5.7vh),4.5rem);line-height:.98;letter-spacing:-.045em}h2{margin:clamp(8px,1.5vh,16px) 0 0;color:var(--magenta);font-size:clamp(1rem,min(1.8vw,2.5vh),1.8rem);line-height:1.18}.scene-text{margin:clamp(8px,1.5vh,16px) 0 0;max-width:780px;color:var(--muted);font-size:clamp(.84rem,min(1.2vw,1.75vh),1.14rem);line-height:1.42}
.scene-place{margin-top:clamp(8px,1.5vh,18px);padding:clamp(10px,1.35vh,15px) clamp(12px,1.3vw,18px);border-left:5px solid var(--mint);border-radius:14px;background:linear-gradient(135deg,var(--mint-soft),#fff)}.scene-place>span{display:block;color:var(--mint);font-size:.77rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.scene-place p{margin:6px 0 0;color:var(--navy);font-size:clamp(.88rem,min(1.2vw,1.72vh),1.12rem);font-weight:800;line-height:1.35}
.community{display:grid;grid-template-columns:30px 1fr;gap:8px;margin-top:clamp(8px,1.4vh,16px);padding:clamp(9px,1.25vh,13px) clamp(11px,1.2vw,16px);border-radius:15px;background:linear-gradient(135deg,var(--navy),#0d1a2c);color:#fff}.community-mark{color:#ffbf2e;font-size:2.5rem;line-height:.8}.community strong{color:#ffbf2e;font-size:.76rem;letter-spacing:.05em;text-transform:uppercase}.community p{margin:5px 0 0;color:#e5edf4;line-height:1.35;font-size:clamp(.78rem,min(1vw,1.5vh),.94rem)}
.decision{display:grid;grid-template-columns:1fr;gap:10px;margin-top:18px}.decision button{min-height:52px;padding:12px 16px;border-radius:13px;font-weight:900}.decision-primary{border:0;background:linear-gradient(135deg,var(--mint),#16886e);color:#fff}.decision-secondary{border:1px solid var(--line);background:#fff;color:var(--navy)}
.reveal-step{opacity:0;transform:translateY(14px);filter:blur(2px);transition:opacity .45s ease,transform .45s ease,filter .45s ease;pointer-events:none}.reveal-step.is-visible{opacity:1;transform:none;filter:none;pointer-events:auto}
.controls{display:grid;grid-template-columns:auto minmax(160px,1fr) auto;align-items:center;gap:12px;padding:0 4px}.nav-btn{min-height:48px;padding:0 20px;border-radius:12px;font-weight:900}#backBtn{border:1px solid var(--line);background:#fff;color:var(--navy)}#forwardBtn{min-width:180px;border:0;background:linear-gradient(135deg,var(--mint),var(--magenta));color:#fff}.progress{height:8px;overflow:hidden;border-radius:999px;background:#dfe7ed}.progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--mint),var(--magenta));transition:width .3s ease}
body.presentation .topbar{display:none}
body.presentation .app{height:100vh;height:100dvh;display:grid;grid-template-rows:minmax(0,1fr) auto;gap:0;padding:0}
body.presentation .stage{height:100%;border:0;border-radius:0;box-shadow:none}
body.presentation .controls{display:grid;position:relative;z-index:50;padding:8px max(10px,env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left));background:rgba(255,255,255,.96);border-top:1px solid var(--line);box-shadow:0 -8px 24px rgba(19,34,56,.10)}
body.presentation .nav-btn{min-height:50px}

.host-panel{border:1px solid var(--line);border-radius:16px;background:#fff;box-shadow:0 8px 24px rgba(19,34,56,.06);overflow:hidden}
.host-panel[open]{max-height:min(34vh,310px)}
.host-panel summary{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:48px;padding:10px 16px;list-style:none;cursor:pointer;color:var(--navy);font-weight:900}
.host-panel summary::-webkit-details-marker{display:none}
.host-panel summary::after{content:"+";display:grid;place-items:center;width:28px;height:28px;border-radius:50%;background:var(--mint-soft);color:var(--mint);font-size:1.2rem}
.host-panel[open] summary::after{content:"–"}
.host-content{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px 14px;max-height:calc(min(34vh,310px) - 50px);overflow:auto}
.host-card{padding:14px;border-radius:14px;background:linear-gradient(135deg,#fbfeff,var(--mint-soft));border:1px solid #dff1f2}
.host-card h3{margin:0 0 9px;color:var(--navy);font-size:1rem}
.host-card p{margin:0;color:var(--muted);font-size:.88rem;line-height:1.42}
.host-card ul{margin:8px 0 0;padding-left:19px;color:var(--muted);font-size:.86rem;line-height:1.42}
.host-card li+li{margin-top:4px}
.reset-btn{border-color:#f2c8df;background:var(--magenta-soft);color:var(--magenta)}
.end-overlay{
  position:absolute;
  inset:0;
  z-index:30;
  display:grid;
  place-items:center;
  pointer-events:none;
  opacity:0;
  transition:opacity .55s ease;
}
.end-overlay.is-visible{
  opacity:1;
  pointer-events:auto;
}
.end-button{
  min-width:min(360px,78vw);
  min-height:72px;
  padding:16px 30px;
  border:3px solid rgba(255,255,255,.92);
  border-radius:20px;
  background:linear-gradient(135deg,var(--mint),var(--magenta));
  color:#fff;
  font-weight:900;
  font-size:clamp(1.15rem,2.4vw,1.8rem);
  box-shadow:0 24px 70px rgba(19,34,56,.38);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.end-button:active{transform:translateY(1px)}




.scene.image-focus .scene-copy>.scene-place{
  display:none!important;
  opacity:0;
  transform:translateY(34px);
}
.scene.image-focus.question-visible .scene-copy>.scene-place.is-visible{
  display:block!important;
  opacity:1;
  transform:translateY(0);
  animation:questionSlideIn .45s ease both;
}
.scene.image-focus.question-leaving .scene-copy>.scene-place{
  display:block!important;
  animation:questionSlideOut .4s ease both;
}
@keyframes questionSlideIn{
  from{opacity:0;transform:translateY(42px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes questionSlideOut{
  from{opacity:1;transform:translateY(0)}
  to{opacity:0;transform:translateY(42px)}
}

.scene.image-focus{grid-template-columns:1fr!important;grid-template-rows:1fr!important}
.scene.image-focus .scene-media{grid-column:1!important;grid-row:1!important;position:absolute;inset:0}
.scene.image-focus .scene-media::after{background:linear-gradient(0deg,rgba(19,34,56,.62),rgba(19,34,56,.04) 56%,rgba(255,255,255,.04))!important}
.scene.image-focus .scene-media img{transform:scale(1.02)}
.scene.image-focus .scene-copy{grid-column:1!important;grid-row:1!important;width:100%!important;z-index:4;background:transparent;padding:clamp(16px,3vw,44px);justify-content:flex-end;pointer-events:none}
.scene.image-focus .scene-copy>*{display:none!important}
.scene.image-focus .scene-copy>.scene-place.is-visible{display:block!important;pointer-events:auto;width:min(900px,92%);margin:0 auto;background:rgba(255,255,255,.96);box-shadow:0 18px 50px rgba(19,34,56,.28);border-left-width:7px;padding:clamp(15px,2.2vw,24px)}
.scene.image-focus .scene-place p{font-size:clamp(1.05rem,min(2vw,2.8vh),1.55rem);line-height:1.35}
.image-focus-hint{position:absolute;right:18px;top:18px;z-index:6;padding:8px 12px;border-radius:999px;background:rgba(19,34,56,.78);color:#fff;font-size:.78rem;font-weight:800;pointer-events:none}
body.session-started:not(.presentation) .topbar,
body.session-started:not(.presentation) .host-panel{display:none}
body.session-started:not(.presentation) .app{
  grid-template-rows:minmax(0,1fr) auto;
}
body.presentation .host-panel{display:none}

@media(max-width:950px){
  .topbar{padding:8px 12px;border-radius:14px}
  .icon-btn{min-height:40px;padding:0 11px}
  .scene{grid-template-columns:1fr;grid-template-rows:minmax(150px,36%) minmax(0,64%)}
  .scene-media,.layout-image-right .scene-media,.layout-image-left .scene-media{grid-column:1;grid-row:1}
  .scene-copy,.layout-image-right .scene-copy,.layout-image-left .scene-copy{grid-column:1;grid-row:2}
  .scene-media::after,.layout-image-right .scene-media::after,.layout-image-left .scene-media::after{background:linear-gradient(0deg,#fff 0%,rgba(255,255,255,.86) 12%,transparent 46%)}
  .layout-center .scene-copy{width:100%;grid-row:2}
  .layout-center .scene-media::after{background:linear-gradient(0deg,#fff 0%,rgba(255,255,255,.86) 12%,transparent 48%)}
  .scene-copy{padding:clamp(14px,2.6vh,28px) clamp(16px,3vw,28px);justify-content:center;overflow:hidden}
  .scene-phase{position:static;margin-bottom:6px}
  .scene-eyebrow{margin-bottom:7px;padding:6px 10px}
  .controls{gap:8px}
  .nav-btn{min-height:46px;padding:0 14px}
  #forwardBtn{min-width:150px}
}
@media(max-width:700px){
  .host-content{grid-template-columns:1fr}
  .host-panel[open]{max-height:min(42vh,360px)}
  .host-content{max-height:calc(min(42vh,360px) - 50px)}
}
@media(max-width:600px){
  .app{padding:6px;gap:6px}
  .brand strong{font-size:1rem}.brand span{display:none}
  .top-actions{gap:5px}.icon-btn{min-width:42px;padding:0 9px}.icon-btn span{display:inline}
  .scene{grid-template-rows:minmax(120px,29%) minmax(0,71%)}
  .scene-copy{padding:12px 14px}
  .scene-phase{font-size:.66rem;margin-bottom:4px}
  .scene-eyebrow{font-size:.67rem;margin-bottom:5px;padding:5px 8px}
  h1{font-size:clamp(1.48rem,8vw,2.2rem);line-height:1}
  h2{font-size:clamp(.9rem,4.3vw,1.15rem)}
  .scene-text{font-size:clamp(.76rem,3.6vw,.93rem);line-height:1.32}
  .scene-place{border-left-width:4px;border-radius:10px}
  .scene-place>span,.community strong{font-size:.65rem}
  .scene-place p{font-size:clamp(.78rem,3.6vw,.94rem);line-height:1.28}
  .community{grid-template-columns:24px 1fr;border-radius:10px}
  .community-mark{font-size:2rem}.community p{font-size:clamp(.72rem,3.25vw,.86rem)}
  .controls{grid-template-columns:auto 1fr auto;padding:0}
  .progress{min-width:40px}
  #forwardBtn{min-width:0}
}
@media(max-height:760px) and (min-width:601px){
  .app{padding:8px;gap:7px}
  .topbar{padding:7px 12px}
  .scene-copy{padding:16px 24px}
  .scene-phase{top:12px;left:24px;font-size:.68rem}
  .scene-eyebrow{margin-bottom:7px;padding:5px 9px;font-size:.68rem}
  h1{font-size:clamp(1.7rem,min(3.5vw,4.8vh),3.4rem)}
  h2{margin-top:8px;font-size:clamp(.94rem,min(1.55vw,2.1vh),1.42rem)}
  .scene-text{margin-top:8px;font-size:clamp(.78rem,min(1.05vw,1.48vh),1rem);line-height:1.32}
  .scene-place{margin-top:8px;padding:8px 12px}
  .scene-place p{font-size:clamp(.8rem,min(1.05vw,1.48vh),1rem);line-height:1.28}
  .community{margin-top:8px;padding:8px 11px}
  .community p{font-size:clamp(.72rem,min(.9vw,1.35vh),.87rem);line-height:1.28}
  .nav-btn{min-height:42px}
}
@media(max-height:560px){
  .topbar{display:none}
  .app{grid-template-rows:minmax(0,1fr) auto;padding:4px}
  .scene{grid-template-columns:42% 58%;grid-template-rows:1fr}
  .scene-media,.layout-image-right .scene-media{grid-column:2;grid-row:1}
  .scene-copy,.layout-image-right .scene-copy{grid-column:1;grid-row:1}
  .layout-image-left .scene-media{grid-column:1;grid-row:1}
  .layout-image-left .scene-copy{grid-column:2;grid-row:1}
  .scene-copy{padding:10px 14px}
  .scene-phase{display:none}
  .scene-eyebrow{margin-bottom:4px}
  h1{font-size:clamp(1.35rem,min(3.2vw,5vh),2.4rem)}
  h2{margin-top:5px;font-size:clamp(.78rem,min(1.5vw,2.4vh),1.12rem)}
  .scene-text{margin-top:5px;font-size:clamp(.68rem,min(.95vw,1.65vh),.88rem);line-height:1.22}
  .scene-place{margin-top:5px;padding:6px 9px}
  .scene-place p{font-size:clamp(.68rem,min(.95vw,1.65vh),.88rem);line-height:1.2}
  .community{margin-top:5px;padding:6px 9px;grid-template-columns:20px 1fr}
  .community-mark{font-size:1.7rem}.community p{font-size:clamp(.64rem,min(.86vw,1.5vh),.8rem);line-height:1.18}
  .controls{padding:0 2px}.nav-btn{min-height:38px;padding:0 12px;font-size:.86rem}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* Mission Dorade artwork is infographic-based: keep each complete composition visible. */
.scene-media img{object-fit:contain;background:#fff;transform:none!important}
.scene.is-active .scene-media img{transform:none!important}
.layout-center .scene-media::after{background:linear-gradient(90deg,rgba(255,255,255,.98),rgba(255,255,255,.88) 39%,rgba(255,255,255,.08) 68%)}
@media(max-width:950px){
  .scene-media img{object-fit:contain}
}
</style>
</head>
<body>
<main class="app">
<header class="topbar"><div class="brand"><strong>Mission Dorade</strong><span data-i18n="brand"></span> · <span data-i18n="film"></span></div><div class="top-actions"><button class="icon-btn reset-btn" id="resetBtn" type="button" data-i18n="reset"></button><button class="icon-btn" id="langBtn" type="button"><span data-i18n="language"></span></button><button class="icon-btn" id="fullscreenBtn" type="button"><span data-i18n="fullscreen"></span></button></div></header>

<details class="host-panel" id="hostPanel" open>
  <summary data-i18n="hostPanelTitle"></summary>
  <div class="host-content">
    <section class="host-card">
      <h3 data-i18n="warmupTitle"></h3>
      <ul><li data-i18n="warmup1"></li><li data-i18n="warmup2"></li><li data-i18n="warmup3"></li><li data-i18n="warmup4"></li><li data-i18n="warmup5"></li></ul>
    </section>
    <section class="host-card">
      <h3 data-i18n="complianceTitle"></h3>
      <p data-i18n="complianceLead"></p>
      <ul><li data-i18n="compliance1"></li><li data-i18n="compliance2"></li><li data-i18n="compliance3"></li><li data-i18n="compliance4"></li><li data-i18n="compliance5"></li></ul>
    </section>
  </div>
</details>

<section class="stage" id="stage">
  <div class="end-overlay" id="endOverlay"><button class="end-button" id="endButton" type="button" data-i18n="endButton"></button></div>
  <div class="image-focus-hint" id="imageFocusHint" hidden data-i18n="imageFocusHint"></div>
  <section class="scene layout-image-right is-active" data-scene="0" aria-hidden="false">
  <div class="scene-media"><img src="00-start-dorade.png" alt="" loading="eager"></div>
  <div class="scene-copy">
    <div class="scene-phase" data-i18n="s0_phase"></div>
    <div class="scene-eyebrow reveal-step" data-step data-i18n="s0_eyebrow"></div>
    <h1 class="reveal-step" data-step data-i18n="s0_title"></h1>
    <h2 class="reveal-step" data-step data-i18n="s0_lead"></h2>
    <p class="scene-text reveal-step" data-step data-i18n="s0_text"></p>
    <div class="scene-place reveal-step" data-step><span data-i18n="placeLabel"></span><p data-i18n="s0_place"></p></div>
    <div class="community reveal-step" data-step><span class="community-mark">“</span><div><strong data-i18n="communityLabel"></strong><p data-i18n="s0_community"></p></div></div>
  </div>
</section><section class="scene layout-image-left" data-scene="1" aria-hidden="true">
  <div class="scene-media"><img src="01-neue-perspektiven.png" alt="" loading="eager"></div>
  <div class="scene-copy">
    <div class="scene-phase" data-i18n="s1_phase"></div>
    <div class="scene-eyebrow reveal-step" data-step data-i18n="s1_eyebrow"></div>
    <h1 class="reveal-step" data-step data-i18n="s1_title"></h1>
    <h2 class="reveal-step" data-step data-i18n="s1_lead"></h2>
    <p class="scene-text reveal-step" data-step data-i18n="s1_text"></p>
    <div class="scene-place reveal-step" data-step><span data-i18n="placeLabel"></span><p data-i18n="s1_place"></p></div>
    <div class="community reveal-step" data-step><span class="community-mark">“</span><div><strong data-i18n="communityLabel"></strong><p data-i18n="s1_community"></p></div></div>
  </div>
</section><section class="scene layout-image-right" data-scene="2" aria-hidden="true">
  <div class="scene-media"><img src="02-warum-club.png" alt="" loading="lazy"></div>
  <div class="scene-copy">
    <div class="scene-phase" data-i18n="s2_phase"></div>
    <div class="scene-eyebrow reveal-step" data-step data-i18n="s2_eyebrow"></div>
    <h1 class="reveal-step" data-step data-i18n="s2_title"></h1>
    <h2 class="reveal-step" data-step data-i18n="s2_lead"></h2>
    <p class="scene-text reveal-step" data-step data-i18n="s2_text"></p>
    <div class="scene-place reveal-step" data-step><span data-i18n="placeLabel"></span><p data-i18n="s2_place"></p></div>
    <div class="community reveal-step" data-step><span class="community-mark">“</span><div><strong data-i18n="communityLabel"></strong><p data-i18n="s2_community"></p></div></div>
  </div>
</section><section class="scene layout-image-left" data-scene="3" aria-hidden="true">
  <div class="scene-media"><img src="03-bildungsauftrag.png" alt="" loading="lazy"></div>
  <div class="scene-copy">
    <div class="scene-phase" data-i18n="s3_phase"></div>
    <div class="scene-eyebrow reveal-step" data-step data-i18n="s3_eyebrow"></div>
    <h1 class="reveal-step" data-step data-i18n="s3_title"></h1>

 });
 const list=steps();
 list.forEach((el,i)=>el.classList.toggle('is-visible',i<revealed));
 backBtn.disabled=current===0&&revealed===0&&imageFocusPhase===0;
 const hasHidden=revealed<list.length;
 forwardBtn.textContent=imageFocusPhase>0
   ? translations[lang].next
   : translations[lang][hasHidden?'reveal':'next'];
 imageFocusHint.hidden=imageFocusPhase===0;
 progressBar.style.width=(((current+(list.length?revealed/list.length:1))/scenes.length)*100)+'%';
 localStorage.setItem('mission-dorade-live-scene',String(current));
 localStorage.setItem('mission-dorade-live-revealed',String(revealed));
 const finalSceneActive=current===scenes.length-1;
 const finalSceneComplete=finalSceneActive && revealed>=list.length && imageFocusPhase===0;
 if(!finalSceneComplete){
   clearTimeout(endTimer);
   endTimer=null;
   endOverlay.classList.remove('is-visible');
 }else if(!endOverlay.classList.contains('is-visible') && !endTimer){
   endTimer=setTimeout(()=>{
     endOverlay.classList.add('is-visible');
     endTimer=null;
   },5000);
 }

}
function advance(){
 if(!document.body.classList.contains('session-started')){
   document.body.classList.add('session-started');
 }
 if(hostPanel.open) hostPanel.open=false;
 if(imageFocusPhase===1){
   imageFocusPhase=2;
   render();
   return;
 }
 if(imageFocusPhase===2){
   imageFocusPhase=3;
   render();
   return;
 }
 if(imageFocusPhase===3){
   imageFocusPhase=0;
   render();
   return;
 }
 const list=steps();
 if(revealed<list.length){
   const nextElement=list[revealed];
   revealed++;
   if(nextElement.classList.contains('scene-place')){
     imageFocusPhase=1;
   }
   render();
   return;
 }
 if(current<scenes.length-1){
   current++;
   revealed=0;
   imageFocusPhase=0;
   render();
 }
}
function back(){
 if(imageFocusPhase===3){
   imageFocusPhase=2;
   render();
   return;
 }
 if(imageFocusPhase===2){
   imageFocusPhase=1;
   render();
   return;
 }
 if(imageFocusPhase===1){
   imageFocusPhase=0;
   render();
   return;
 }
 if(revealed>0){
   revealed--;
   render();
   return;
 }
 if(current>0){
   current--;
   revealed=steps().length;
   imageFocusPhase=0;
   render();
 }
}
forwardBtn.addEventListener('click',advance);
backBtn.addEventListener('click',back);
function resetMeeting(ask=true){
  if(ask && !window.confirm(translations[lang].resetConfirm)) return;
  current=0;
  revealed=0;
  imageFocusPhase=0;
  clearTimeout(endTimer);
  endTimer=null;
  endOverlay.classList.remove('is-visible');
  localStorage.removeItem('mission-dorade-live-scene');
  localStorage.removeItem('mission-dorade-live-revealed');
  hostPanel.open=true;
  document.body.classList.remove('presentation');
  document.body.classList.remove('session-started');
  render();
}
resetBtn.addEventListener('click',()=>resetMeeting(true));
endButton.addEventListener('click',()=>resetMeeting(false));
langBtn.addEventListener('click',()=>{lang=lang==='de'?'en':'de';applyLanguage()});
fullscreenBtn.addEventListener('click',async()=>{
  const entering=!document.body.classList.contains('presentation');
  document.body.classList.toggle('presentation',entering);
  try{
    if(entering && document.documentElement.requestFullscreen && !document.fullscreenElement){
      await document.documentElement.requestFullscreen();
    }else if(!entering && document.fullscreenElement && document.exitFullscreen){
      await document.exitFullscreen();
    }
  }catch(e){
    /* iPad/Safari may block the native fullscreen API.
       The presentation layout still works and keeps all controls visible. */
  }
});
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement && document.body.classList.contains('presentation')){
    /* Keep presentation layout active on tablets until the button is pressed again. */
  }
});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '||e.key==='Enter'){e.preventDefault();advance()}else if(e.key==='ArrowLeft'){e.preventDefault();back()}else if(e.key.toLowerCase()==='l')langBtn.click();else if(e.key.toLowerCase()==='f')fullscreenBtn.click()});
applyLanguage();render();
})();
</script>
</body>
</html>
