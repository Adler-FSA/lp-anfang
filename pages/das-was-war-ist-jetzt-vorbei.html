<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Das, was war, ist jetzt vorbei</title>
  <meta name="description" content="Songseite mit Coverbild und Audio – Das, was war, ist jetzt vorbei." />
  <meta name="robots" content="index,follow" />

  <style>
    :root{
      --bg:#0b1020;
      --bg2:#121a31;
      --card:rgba(255,255,255,.08);
      --line:rgba(255,255,255,.14);
      --text:#f4f7fb;
      --muted:#c9d3e6;
      --gold:#f0c86e;
      --shadow:0 24px 70px rgba(0,0,0,.45);
      --radius:24px;
      --max:980px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      background:
        radial-gradient(circle at top right, rgba(240,200,110,.18), transparent 30%),
        radial-gradient(circle at top left, rgba(56,118,255,.14), transparent 28%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 16px;
    }

    .wrap{
      width:100%;
      max-width:var(--max);
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      overflow:hidden;
    }

    .hero{
      position:relative;
      overflow:hidden;
    }

    .hero img{
      display:block;
      width:100%;
      height:auto;
      object-fit:cover;
      background:#111;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:auto 0 0 0;
      height:34%;
      background:linear-gradient(180deg, rgba(11,16,32,0) 0%, rgba(11,16,32,.72) 100%);
      pointer-events:none;
    }

    .content{
      padding:22px 22px 24px;
    }

    h1{
      margin:0 0 8px;
      font-size:clamp(1.7rem, 4vw, 2.8rem);
      line-height:1.08;
      letter-spacing:.02em;
      color:#fff;
      text-align:center;
    }

    .sub{
      margin:0 0 20px;
      text-align:center;
      color:var(--gold);
      font-size:clamp(1rem, 2.1vw, 1.2rem);
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .player{
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
    }

    audio{
      width:100%;
      display:block;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,.22));
    }

    .hint{
      margin:12px 0 0;
      text-align:center;
      color:var(--muted);
      font-size:.95rem;
    }

    @media (max-width:640px){
      body{padding:14px}
      .content{padding:16px}
      .player{padding:12px}
      .hint{font-size:.9rem}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="hero">
        <img
          src="../library/images/IMG_5952.jpeg"
          alt="Coverbild zum Song Das, was war, ist jetzt vorbei"
        />
      </div>

      <div class="content">
        <h1>Das, was war, ist jetzt vorbei</h1>
        <p class="sub">Ein neuer Weg</p>

        <div class="player">
          <audio controls preload="metadata">
            <source src="../library/music/wuerdevoller-aufbruch.mp3" type="audio/mpeg" />
            Dein Browser unterstützt das Audio-Element nicht.
          </audio>
          <p class="hint">Bild ansehen. Lied starten. Mehr braucht es hier nicht.</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
