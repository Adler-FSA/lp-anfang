<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Das, was war, ist jetzt vorbei</title>
  <meta name="description" content="Songseite mit Coverbild und Audio – Das, was war, ist jetzt vorbei." />
  <meta name="robots" content="index,follow" />

  <style>
    :root{
      --bg:#ffffff;
      --paper:#ffffff;
      --ink:#14324a;
      --muted:#5f7386;
      --line:rgba(20,50,74,.12);
      --teal:#23a9ba;
      --teal-dark:#1c8f9d;
      --magenta:#c12674;
      --gold:#d8a847;
      --shadow:0 18px 48px rgba(15,23,42,.10);
      --radius:22px;
      --max:920px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--ink);
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      padding:28px 16px 40px;
    }

    .wrap{
      width:100%;
      max-width:var(--max);
      margin:0 auto;
    }

    .page-head{
      text-align:center;
      margin:0 0 18px;
    }

    .brand{
      display:inline-flex;
      align-items:center;
      gap:10px;
      color:var(--teal-dark);
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
      font-size:.86rem;
      margin-bottom:10px;
    }

    .brand-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--teal),var(--magenta));
      box-shadow:0 0 0 4px rgba(35,169,186,.10);
      flex:0 0 auto;
    }

    h1{
      margin:0;
      font-size:clamp(1.9rem, 4vw, 3rem);
      line-height:1.08;
      color:var(--ink);
      letter-spacing:.01em;
    }

    .sub{
      margin:10px 0 0;
      color:var(--magenta);
      font-size:clamp(1rem, 2vw, 1.15rem);
      font-weight:700;
      letter-spacing:.10em;
      text-transform:uppercase;
    }

    .card{
      background:var(--paper);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      padding:24px;
    }

    .cover-wrap{
      display:flex;
      justify-content:center;
      margin:0 0 22px;
    }

    .cover{
      width:100%;
      max-width:560px;
      border-radius:18px;
      display:block;
      box-shadow:0 14px 34px rgba(15,23,42,.12);
      border:1px solid rgba(20,50,74,.10);
      background:#f4f7f9;
    }

    .player-box{
      max-width:720px;
      margin:0 auto;
      background:linear-gradient(180deg, rgba(35,169,186,.06), rgba(193,38,116,.04));
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
    }

    .player-title{
      margin:0 0 12px;
      text-align:center;
      font-size:1rem;
      font-weight:700;
      color:var(--teal-dark);
    }

    audio{
      width:100%;
      display:block;
    }

    .note{
      margin:12px 0 0;
      text-align:center;
      color:var(--muted);
      font-size:.95rem;
      line-height:1.45;
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .btn{
      appearance:none;
      border:0;
      border-radius:999px;
      padding:12px 18px;
      font-size:.98rem;
      font-weight:700;
      cursor:pointer;
      transition:transform .15s ease, opacity .15s ease, box-shadow .15s ease;
    }

    .btn:hover{ transform:translateY(-1px); }
    .btn:active{ transform:translateY(0); }

    .btn-play{
      color:#fff;
      background:linear-gradient(135deg,var(--teal),var(--magenta));
      box-shadow:0 12px 24px rgba(35,169,186,.18);
    }

    .btn-stop{
      color:var(--ink);
      background:#eef4f7;
      border:1px solid var(--line);
    }

    @media (max-width:640px){
      body{ padding:18px 12px 32px; }
      .card{ padding:16px; }
      .cover{ max-width:100%; }
      .player-box{ padding:12px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="page-head">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>LiquidityBooster Music</span>
      </div>
      <h1>Das, was war, ist jetzt vorbei</h1>
      <p class="sub">Ein neuer Weg</p>
    </header>

    <section class="card">
      <div class="cover-wrap">
        <img
          class="cover"
          src="../library/images/IMG_5952.jpeg"
          alt="Coverbild zum Song Das, was war, ist jetzt vorbei"
        />
      </div>

      <div class="player-box">
        <p class="player-title">Song abspielen</p>

        <audio id="songPlayer" controls preload="metadata">
          <source src="../library/music/würdevoller-aufbruch.mp3" type="audio/mpeg">
          <source src="../library/music/würdevoller-aufbruch.mp3" type="audio/mp3">
          Dein Browser unterstützt das Audio-Element nicht.
        </audio>

        <div class="actions">
          <button type="button" class="btn btn-play" id="playBtn">▶ Lied starten</button>
          <button type="button" class="btn btn-stop" id="stopBtn">■ Stop</button>
        </div>

        <p class="note">
          Weißer LiquidityBooster-Stil, kleineres Cover und zusätzlicher Start-Button.
        </p>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const audio = document.getElementById('songPlayer');
      const playBtn = document.getElementById('playBtn');
      const stopBtn = document.getElementById('stopBtn');

      async function startAudio() {
        try {
          await audio.play();
        } catch (err) {
          console.warn('Audio konnte nicht direkt gestartet werden:', err);
        }
      }

      function stopAudio() {
        audio.pause();
        audio.currentTime = 0;
      }

      playBtn.addEventListener('click', startAudio);
      stopBtn.addEventListener('click', stopAudio);
    })();
  </script>
</body>
</html>
