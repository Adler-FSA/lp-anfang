<!doctype html>
<!--

  Commit-Message: akquise/qr-code – mobile QR Übergabeseite mit Logo und Hinweistext ergänzt
  Testlink (nocache): https://adler-fsa.github.io/lp-anfang/pages/akquise/qr-code.html?nocache=__TS__
-->
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>QR-Code | LiquidityBooster</title>
  <meta name="description" content="QR-Code Übergabeseite für Gespräche – Video ansehen und selbst entscheiden." />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="QR-Code" />

  <style>
    :root{
      --bg:#f8fafc;
      --panel:#ffffff;
      --ink:#0f172a;
      --muted:#475569;
      --teal:#2aa8b8;
      --mag:#b01861;
      --line:rgba(15,23,42,.10);
      --shadow:0 20px 60px rgba(15,23,42,.10);
      --radius:24px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:
        radial-gradient(circle at top left, rgba(42,168,184,.10), transparent 28%),
        radial-gradient(circle at top right, rgba(176,24,97,.08), transparent 24%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      min-height:100%;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:
        max(20px, env(safe-area-inset-top))
        18px
        max(20px, env(safe-area-inset-bottom))
        18px;
    }

    .card{
      width:min(100%, 520px);
      background:rgba(255,255,255,.96);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px 20px 22px;
      text-align:center;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    .logo-wrap{
      margin:0 auto 16px;
    }

    .logo{
      display:block;
      width:min(100%, 360px);
      height:auto;
      margin:0 auto;
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(1.35rem, 4vw, 1.8rem);
      line-height:1.15;
      letter-spacing:.01em;
      color:var(--ink);
    }

    .lead{
      margin:0 auto 20px;
      max-width:28ch;
      font-size:1.02rem;
      line-height:1.5;
      color:var(--muted);
    }

    .lead strong{
      color:var(--mag);
      font-weight:800;
    }

    .qr-box{
      width:min(100%, 360px);
      margin:0 auto 16px;
      background:#fff;
      border:1px solid rgba(15,23,42,.08);
      border-radius:22px;
      padding:14px;
      box-shadow:0 14px 34px rgba(15,23,42,.08);
    }

    .qr{
      display:block;
      width:100%;
      height:auto;
      border-radius:14px;
      background:#fff;
    }

    .note{
      margin:0;
      font-size:.95rem;
      line-height:1.45;
      color:var(--teal);
      font-weight:700;
    }

    .subnote{
      margin:8px 0 0;
      font-size:.88rem;
      line-height:1.45;
      color:var(--muted);
    }

    @media (min-height: 820px){
      .card{
        padding:28px 24px 24px;
      }
    }

    @media (prefers-reduced-motion: no-preference){
      .card{
        animation:fadeUp .45s ease both;
      }
      .qr-box{
        animation:fadeIn .7s ease both;
      }
    }

    @keyframes fadeUp{
      from{opacity:0; transform:translateY(12px)}
      to{opacity:1; transform:translateY(0)}
    }

    @keyframes fadeIn{
      from{opacity:0}
      to{opacity:1}
    }
  </style>
</head>
<body>
  <main class="card" aria-label="QR-Code Übergabeseite">
    <div class="logo-wrap">
      <img
        class="logo"
        src="../../library/logos/liquiditybooster-logo.png"
        alt="LiquidityBooster Logo"
      />
    </div>

    <h1>Einfach weitergeben</h1>

    <p class="lead">
      <strong>QR-Code scannen, Video ansehen und selbst entscheiden.</strong>
    </p>

    <div class="qr-box">
      <img
        class="qr"
        src="../../library/images/qr-code.jpg"
        alt="QR-Code zur Informationsseite"
      />
    </div>

    <p class="note">Einfach mit der Smartphone-Kamera scannen.</p>
    <p class="subnote">So lässt sich die Seite direkt und unkompliziert öffnen.</p>
  </main>
</body>
</html>
