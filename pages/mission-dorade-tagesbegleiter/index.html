<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#00a7ad">
  <title>Mission Dorade – Persönlicher Tagesbegleiter</title>
  <meta name="description" content="Der persönliche Tagesbegleiter für Club Partner: ein Tagesspruch, eine Mission, ein klarer Schritt.">
  <style>
    :root{--mint:#00a7ad;--magenta:#c6006f;--navy:#132238;--paper:#ffffff;--soft:#eef8f8;--line:#cfe8e9;--shadow:0 18px 45px rgba(19,34,56,.14)}
    *{box-sizing:border-box}
    html{min-height:100%;background:#eef8f8}
    body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;color:var(--navy);background:linear-gradient(145deg,rgba(0,167,173,.13),rgba(198,0,111,.08) 58%,#fff)}
    button,input,select{font:inherit}
    .shell{width:min(760px,calc(100% - 28px));margin:0 auto;padding:24px 0 42px}
    .topline{height:8px;border-radius:999px;background:linear-gradient(90deg,var(--mint) 0 50%,var(--magenta) 50%)}
    .card{margin-top:16px;background:rgba(255,255,255,.96);border:1px solid rgba(0,167,173,.22);border-radius:28px;box-shadow:var(--shadow);overflow:hidden}
    .setup{padding:30px}
    .eyebrow{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;font-weight:800;color:var(--magenta)}
    h1{font-size:clamp(2rem,7vw,3.4rem);line-height:1.04;margin:10px 0 12px}
    .lead{font-size:1.05rem;line-height:1.6;margin:0 0 24px;color:#425166}
    .fields{display:grid;gap:16px}
    label{display:grid;gap:7px;font-weight:800}
    input,select{width:100%;border:1px solid #bfdadc;border-radius:14px;padding:14px 15px;background:#fff;color:var(--navy)}
    input:focus,select:focus{outline:3px solid rgba(0,167,173,.16);border-color:var(--mint)}
    .btn{border:0;border-radius:14px;padding:14px 18px;font-weight:800;cursor:pointer;transition:.18s transform,.18s box-shadow}
    .btn:active{transform:translateY(1px)}
    .btn-primary{background:linear-gradient(90deg,var(--mint),var(--magenta));color:#fff;box-shadow:0 10px 26px rgba(0,167,173,.23)}
    .btn-secondary{background:#fff;color:var(--navy);border:1px solid #cbdfe0}
    .daily{display:none}
    .daily.active{display:block}
    .daily-head{padding:28px 30px 22px;background:linear-gradient(120deg,rgba(0,167,173,.12),rgba(198,0,111,.08))}
    .hello{font-size:clamp(1.85rem,6vw,3rem);margin:5px 0 8px}
    .date{margin:0;font-weight:700;color:#5c6675}
    .notice{margin-top:14px;padding:11px 13px;border-left:4px solid var(--mint);background:#fff;border-radius:10px;font-size:.94rem;line-height:1.45}
    .content{padding:28px 30px 32px}
    .section-title{font-size:.78rem;letter-spacing:.11em;text-transform:uppercase;font-weight:900;color:var(--magenta);margin-bottom:12px}
    blockquote{margin:0;padding:0;border:0;font-family:Georgia,'Times New Roman',serif;font-weight:700;font-size:clamp(1.65rem,5vw,2.55rem);line-height:1.22;text-wrap:balance}
    .divider{height:2px;background:linear-gradient(90deg,var(--mint),var(--magenta));margin:28px 0}
    .mission{font-size:1.18rem;line-height:1.55;font-weight:700;margin:0}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:26px}
    .done{background:var(--mint);color:#fff}
    .done.is-done{background:#dceff0;color:#173d40}
    .share{background:var(--magenta);color:#fff}
    .closing{text-align:center;margin:22px 0 0;color:#667282;font-size:.92rem}
    .smalltools{display:flex;justify-content:center;margin-top:16px}
    .smalltools button{background:transparent;border:0;color:#6f7885;text-decoration:underline;cursor:pointer;font-size:.88rem}
    .holiday{color:var(--magenta);font-weight:900}
    .hidden{display:none!important}
    @media(max-width:560px){.shell{width:min(100% - 18px,760px);padding-top:10px}.setup,.daily-head,.content{padding-left:20px;padding-right:20px}.actions{grid-template-columns:1fr}.card{border-radius:22px}}
  </style>
</head>
<body>
  <main class="shell">
    <div class="topline" aria-hidden="true"></div>

    <section class="card setup" id="setupCard" aria-labelledby="setupTitle">
      <div class="eyebrow">Mission Dorade</div>
      <h1 id="setupTitle">Willkommen an Bord.</h1>
      <p class="lead">Richte deinen persönlichen Tagesbegleiter einmal ein. Danach zeigt er dir jeden Tag nur das, was heute zählt.</p>
      <form id="setupForm" class="fields">
        <label>Vorname<input id="firstName" autocomplete="given-name" required maxlength="40" placeholder="Dein Vorname"></label>
        <label>Ansprache<select id="gender" required><option value="">Bitte auswählen</option><option value="m">Mann</option><option value="f">Frau</option></select></label>
        <label>Bundesland<select id="state" required>
          <option value="">Bitte auswählen</option><option value="BW">Baden-Württemberg</option><option value="BY">Bayern</option><option value="BE">Berlin</option><option value="BB">Brandenburg</option><option value="HB">Bremen</option><option value="HH">Hamburg</option><option value="HE">Hessen</option><option value="MV">Mecklenburg-Vorpommern</option><option value="NI">Niedersachsen</option><option value="NW">Nordrhein-Westfalen</option><option value="RP">Rheinland-Pfalz</option><option value="SL">Saarland</option><option value="SN">Sachsen</option><option value="ST">Sachsen-Anhalt</option><option value="SH">Schleswig-Holstein</option><option value="TH">Thüringen</option>
        </select></label>
        <label>Eintrittsdatum als Club Partner<input id="joinDate" type="date" required></label>
        <label>Urlaub von <input id="vacationStart" type="date"></label>
        <label>Urlaub bis <input id="vacationEnd" type="date"></label>
        <button class="btn btn-primary" type="submit">Tagesbegleiter starten</button>
      </form>
    </section>

    <section class="card daily" id="dailyCard" aria-live="polite">
      <header class="daily-head">
        <div class="eyebrow">Mission Dorade · Persönlicher Tagesbegleiter</div>
        <h1 class="hello" id="hello"></h1>
        <p class="date" id="dateLine"></p>
        <div class="notice" id="scheduleNotice"></div>
      </header>
      <div class="content">
        <div class="section-title">Tagesspruch</div>
        <blockquote id="saying"></blockquote>
        <div class="divider"></div>
        <div class="section-title">Deine Mission heute</div>
        <p class="mission" id="mission"></p>
        <div class="actions">
          <button class="btn done" id="doneBtn" type="button">Mission erfüllt</button>
          <button class="btn share" id="shareBtn" type="button">Tagesspruch teilen</button>
        </div>
        <p class="closing" id="closing">Bis morgen.</p>
      </div>
    </section>
    <div class="smalltools hidden" id="smallTools"><button id="resetBtn" type="button">Persönliche Daten ändern</button></div>
  </main>

const MISSIONS = {"0": ["Rufe heute einen Menschen an und lade ihn zum Clubtreffen von 19:00 bis 21:00 Uhr ein.", "Nimm heute telefonisch Kontakt auf und sprich eine persönliche Einladung für das Clubtreffen aus.", "Wähle heute einen Kontakt und lade ihn telefonisch zum Clubtreffen ein."], "1": ["Rufe heute einen offenen Kontakt an und kläre den nächsten Schritt.", "Fasse heute telefonisch bei einem Gespräch von gestern nach.", "Nimm heute einen Kontakt wieder auf, der noch offen geblieben ist."], "2": ["Rufe heute einen Menschen an und halte den Kontakt lebendig. Am Abend ist Club-Stammtisch von 19:00 bis 21:00 Uhr.", "Führe heute ein persönliches Telefonat. Am Abend ist Club-Stammtisch von 19:00 bis 21:00 Uhr.", "Nimm heute telefonisch Kontakt auf und sei am Abend beim Club-Stammtisch von 19:00 bis 21:00 Uhr dabei."], "3": ["Rufe heute einen Menschen an, mit dem du länger nicht gesprochen hast.", "Nimm heute telefonisch einen neuen oder alten Kontakt auf.", "Führe heute ein ruhiges Telefonat und höre aufmerksam zu."], "4": ["Fasse heute telefonisch bei einem offenen Kontakt nach.", "Rufe heute einen Menschen an und schließe die Woche mit einem klaren nächsten Schritt ab.", "Nimm heute einen offenen Faden telefonisch wieder auf."], "5": ["Nutze heute eine ruhige Gelegenheit für ein persönliches Telefonat.", "Rufe heute einen Menschen an, an den du gerade denken musst.", "Pflege heute telefonisch einen Kontakt, der dir wichtig ist."], "6": ["Nimm dir heute Zeit für Ruhe, Familie und einen klaren Blick auf die kommende Woche.", "Lass den heutigen Tag ruhig sein und bereite dich ohne Druck auf die neue Woche vor.", "Schenke heute den Menschen Zeit, die dir wichtig sind."]};
const STORAGE_KEY = 'missionDoradeDailyProfileV1';
const DONE_PREFIX = 'missionDoradeDone:';

const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
const iso = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const dateOnly = value => value ? new Date(value + 'T12:00:00') : null;

function easterSunday(year){
  const a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;
  return new Date(year,month-1,day,12);
}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
function holidayName(date,state){
  const y=date.getFullYear(), key=`${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  const fixed={'01-01':'Neujahr','05-01':'Tag der Arbeit','10-03':'Tag der Deutschen Einheit','12-25':'1. Weihnachtstag','12-26':'2. Weihnachtstag'};
  if(fixed[key]) return fixed[key];
  if(key==='01-06' && ['BW','BY','ST'].includes(state)) return 'Heilige Drei Könige';
  if(key==='03-08' && ['BE','MV'].includes(state)) return 'Internationaler Frauentag';
  if(key==='08-15' && ['SL'].includes(state)) return 'Mariä Himmelfahrt';
  if(key==='09-20' && state==='TH') return 'Weltkindertag';
  if(key==='10-31' && ['BB','HB','HH','MV','NI','SN','ST','SH','TH'].includes(state)) return 'Reformationstag';
  if(key==='11-01' && ['BW','BY','NW','RP','SL'].includes(state)) return 'Allerheiligen';
  const easter=easterSunday(y);
  const move=[[-2,'Karfreitag'],[1,'Ostermontag'],[39,'Christi Himmelfahrt'],[50,'Pfingstmontag']];
  if(['BW','BY','HE','NW','RP','SL'].includes(state)) move.push([60,'Fronleichnam']);
  for(const [off,name] of move) if(iso(addDays(easter,off))===iso(date)) return name;
  return '';
}
function isVacation(today,p){
  const a=dateOnly(p.vacationStart), b=dateOnly(p.vacationEnd);
  return !!(a&&b&&today>=a&&today<=b);
}
function personalDay(today,joinDate){
  const start=dateOnly(joinDate); if(!start) return 1;
  return Math.max(1,Math.floor((today-start)/86400000)+1);
}
function dailyIndex(today,p){return (personalDay(today,p)-1)%SAYINGS.length}
function getMission(today,p,holiday,vacation){
  if(vacation) return 'Genieße heute deinen Urlaub und schenke den Menschen Zeit, die dir wichtig sind.';
  if(holiday) return `Nimm dir am heutigen Feiertag Zeit für Ruhe, Familie und ein gutes Gespräch.`;
  const arr = MISSIONS[today.getDay()] || MISSIONS[String(today.getDay())];
  const week = Math.floor((personalDay(today,p)-1)/7);
  return arr[week % arr.length];
}
function scheduleText(today,holiday,vacation){
  if(vacation) return 'Heute ist Urlaub. Die normale Tagesmission macht Pause.';
  if(holiday) return `<span class="holiday">${holiday}</span> · Heute findet kein regulärer Termin statt.`;
  const parts=['09:00 Uhr · Gemeinsames Online-Frühstück'];
  if(today.getDay()===1) parts.push('19:00–21:00 Uhr · Clubtreffen');
  if(today.getDay()===3) parts.push('19:00–21:00 Uhr · Club-Stammtisch');
  return parts.join('<br>');
}
function loadProfile(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'null')}catch{return null}}
function saveProfile(p){localStorage.setItem(STORAGE_KEY,JSON.stringify(p))}
function showDaily(profile){
  const today=new Date(); today.setHours(12,0,0,0);
  const h=holidayName(today,profile.state), vacation=isVacation(today,profile);
  const idx=dailyIndex(today,profile);
  $('setupCard').classList.add('hidden');
  $('dailyCard').classList.add('active');
  $('smallTools').classList.remove('hidden');
  $('hello').textContent=`Willkommen zurück an Bord, ${profile.firstName}.`;
  $('dateLine').textContent=today.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  $('scheduleNotice').innerHTML=scheduleText(today,h,vacation);
  $('saying').textContent='„'+SAYINGS[idx]+'“';
  $('mission').textContent=getMission(today,profile,h,vacation);
  const doneKey=DONE_PREFIX+iso(today);
  const done=localStorage.getItem(doneKey)==='1';
  $('doneBtn').classList.toggle('is-done',done);
  $('doneBtn').textContent=done?'Mission erfüllt':'Mission erfüllt';
  $('closing').textContent=done?'Morgen wartet eine neue Mission auf dich.':'Bis morgen.';
  $('doneBtn').onclick=()=>{
    const nowDone=localStorage.getItem(doneKey)!=='1';
    if(nowDone) localStorage.setItem(doneKey,'1'); else localStorage.removeItem(doneKey);
    $('doneBtn').classList.toggle('is-done',nowDone);
    $('closing').textContent=nowDone?'Morgen wartet eine neue Mission auf dich.':'Bis morgen.';
  };
  $('shareBtn').onclick=()=>shareSaying(SAYINGS[idx]);
}
async function shareSaying(text){
  const canvas=document.createElement('canvas'); canvas.width=1080; canvas.height=1920;
  const ctx=canvas.getContext('2d');
  const grad=ctx.createLinearGradient(0,0,1080,1920); grad.addColorStop(0,'#00a7ad'); grad.addColorStop(.55,'#00a7ad'); grad.addColorStop(.56,'#c6006f'); grad.addColorStop(1,'#c6006f');
  ctx.fillStyle=grad; ctx.fillRect(0,0,1080,1920);
  ctx.fillStyle='rgba(255,255,255,.96)'; ctx.fillRect(90,230,900,1460);
  ctx.fillStyle='#132238'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='700 78px Georgia';
  const maxWidth=760, words=('„'+text+'“').split(' '), lines=[]; let line='';
  for(const word of words){const test=line?line+' '+word:word;if(ctx.measureText(test).width>maxWidth&&line){lines.push(line);line=word}else line=test} lines.push(line);
  const lineHeight=108, startY=960-((lines.length-1)*lineHeight/2);
  lines.forEach((l,i)=>ctx.fillText(l,540,startY+i*lineHeight));
  const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/png',1));
  if(!blob) return;
  const file=new File([blob],'tagesspruch.png',{type:'image/png'});
  try{
    if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file]});return}
  }catch(e){if(e&&e.name==='AbortError')return}
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='tagesspruch.png'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1500);
}

$('setupForm').addEventListener('submit',e=>{
  e.preventDefault();
  const p={firstName:$('firstName').value.trim(),gender:$('gender').value,state:$('state').value,joinDate:$('joinDate').value,vacationStart:$('vacationStart').value,vacationEnd:$('vacationEnd').value};
  saveProfile(p); showDaily(p);
});
$('resetBtn').addEventListener('click',()=>{
  const p=loadProfile();
  if(p){$('firstName').value=p.firstName||'';$('gender').value=p.gender||'';$('state').value=p.state||'';$('joinDate').value=p.joinDate||'';$('vacationStart').value=p.vacationStart||'';$('vacationEnd').value=p.vacationEnd||''}
  $('dailyCard').classList.remove('active'); $('setupCard').classList.remove('hidden'); $('smallTools').classList.add('hidden');
});
const profile=loadProfile();
if(profile) showDaily(profile);
else $('joinDate').value=iso(new Date());
</script>
