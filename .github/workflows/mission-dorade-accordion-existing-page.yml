name: Mission Dorade Accordion Existing Page

on:
  workflow_dispatch: {}
  push:
    paths:
      - '.github/triggers/mission-dorade-accordion-existing-page.txt'

permissions:
  contents: write

jobs:
  update-page:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bestehende Seite umbauen
        run: python .github/scripts/mission_dorade_accordion.py
      - name: Änderung committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages/mission-dorade/projekt-shop-bilder-logos-pdf.html
          git commit -m "Mission Dorade: Produktbilder als aufklappbare Collections" || exit 0
          git push
