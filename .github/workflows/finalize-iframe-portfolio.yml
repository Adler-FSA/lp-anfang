name: Finalize iFrame Portfolio Calculator

on:
  push:
    paths:
      - '.github/workflows/finalize-iframe-portfolio.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update calculator
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('pages/heinz-riedel-portfolio-rechner.html')
          text = path.read_text(encoding='utf-8')

          text = re.sub(r'<header class="site-header">.*?</header>\s*', '', text, count=1, flags=re.S)
          text = text.replace('--soft:#f5f9fb;', '--soft:#ffffff;')
          text = re.sub(r'body\{margin:0;background:[^;]+;', 'body{margin:0;background:#ffffff;', text, count=1)
          text = text.replace("$('resetBtnTop').addEventListener('click',resetAll);\n", '')

          text = text.replace(
              'Commit-Message: iFrame-Version – Rechner mit Funktionsleiste ohne Logo, Werbetext, Hero und Footer',
              'Commit-Message: iFrame-Version – weißer Hintergrund, obere Funktionsleiste entfernt, Bedienung unten'
          )

          path.write_text(text, encoding='utf-8')
          PY
          rm .github/workflows/finalize-iframe-portfolio.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Portfolio-Rechner: obere Leiste entfernen und Hintergrund weiß"
          git push
