name: Mission Dorade Arbeitsseite final bereinigen

on:
  push:
    paths:
      - '.github/workflows/mission-dorade-final-bereinigen.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finale bereinigte Arbeitsseite schreiben
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64, gzip
          payload = ''''''
          data = gzip.decompress(base64.b64decode(payload))
          Path('pages/mission-dorade/projekt-shop-bilder-logos-pdf.html').write_bytes(data)
          PY
      - name: Änderung committen
        shell: bash
        run: |
          git config user.name "Adler-FSA Automation"
          git config user.email "actions@users.noreply.github.com"
          git add pages/mission-dorade/projekt-shop-bilder-logos-pdf.html
          git commit -m "Mission Dorade ProShop: finale Arbeitsseite sauber bereinigen" || exit 0
          git push
