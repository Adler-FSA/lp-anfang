name: Portfolio-Rechner iFrame-only

on:
  push:
    paths:
      - '.github/workflows/iframe-only-portfolio-rechner.yml'

permissions:
  contents: write

jobs:
  update-calculator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Remove surrounding website elements
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('pages/heinz-riedel-portfolio-rechner.html')
          text = path.read_text(encoding='utf-8')

          text = re.sub(r'\n\s*<div class="topline"[\s\S]*?</header>\s*\n', '\n', text, count=1)
          text = re.sub(r'\n\s*<section class="hero">[\s\S]*?</section>\s*\n\s*<div class="wrap">', '\n    <div class="wrap">', text, count=1)
          text = re.sub(r'\n\s*<footer class="footer">[\s\S]*?</footer>\s*\n', '\n', text, count=1)

          text = text.replace("$('calculateTopBtn').addEventListener('click',calculate);", "$('calculateTopBtn')?.addEventListener('click',calculate);")
          text = text.replace("$('saveBtn').addEventListener('click',saveState);", "$('saveBtn')?.addEventListener('click',saveState);")
          text = text.replace("$('printBtn').addEventListener('click',handlePrint);", "$('printBtn')?.addEventListener('click',handlePrint);")

          text = text.replace('Commit-Message: Fix PDF blank pages while preserving original XXL.IMMO calculator URL', 'Commit-Message: iFrame-Version – nur Rechner, Kopfbereich, Hero und Footer entfernt')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit calculator update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages/heinz-riedel-portfolio-rechner.html
          git diff --cached --quiet && exit 0
          git commit -m "Portfolio-Rechner: nur Rechner für iFrame anzeigen"
          git push origin main
