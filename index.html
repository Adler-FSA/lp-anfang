<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FSA Landingpage – Video</title>
  <meta name="robots" content="noindex,follow" />
  <style>
    html,body{
      margin:0;
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
    }

    *{
      box-sizing:border-box;
    }

    body{
      position:relative;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    .video-only{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      background:#000;
    }

    .video-only iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#000;
    }
  </style>
</head>
<body>
  <div class="video-only">
    <iframe
      src="https://www.yout-ube.com/embed/miWBKSszEIw?autoplay=0&mute=0&loop=1&controls=1&modestbranding=1&playsinline=1"
      title="FSA Video"
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
